<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Go-Lives — Restaura Jeans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #edebe8;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #dedad2;
  --border2: #c8c4bb;
  --text: #111110;
  --text2: #5c5a56;
  --text3: #8f8d87;
  --teal: #0a5c47;
  --teal-bg: #d6f0e6;
  --teal-mid: #158a61;
  --amber: #2d3a8c;
  --amber-bg: #e0e4f8;
  --amber-mid: #4f5fc4;
  --red: #8b1a1a;
  --red-bg: #fce4e4;
  --blue: #103d7c;
  --blue-bg: #dceafa;
  --purple: #3d1a8b;
  --purple-bg: #e8e0fa;
  --font: 'Inter', system-ui, sans-serif;
  --hero-bg1: #f5f4f1; --hero-bg2: #edecea; --hero-bg3: #e8f0ec;
  --hband-border: rgba(0,0,0,0.08);
  --hband-glow: rgba(21,138,97,0.05);
  --hpill-border: rgba(0,0,0,0.1);
  --hpill-bg: rgba(0,0,0,0.04);
  --hname-color: #1a1917;
  --hdivider: rgba(0,0,0,0.1);
  --htitle-h1: #1a1917;
  --htitle-sub: #9b9a92;
  --hmeta: #9b9a92;
  --htoggle-border: rgba(0,0,0,0.1);
  --htoggle-bg: rgba(0,0,0,0.04);
  --htoggle-color: #6b6960;
  --mc-bg: #ffffff;
  --mc-border: #e0ddd5;
  --mc-lbl: #9b9a92;
  --mc-val: #111110;
  --mc-sub: #9b9a92;
  --sp-inner: #e0ddd5;
  --sp-item: #f0ede8;
  --sp-loja: #111110;
  --sp-sub: #9b9a92;
  --sp-empty: #9b9a92;
  --odd: #ffffff; --even: #f8f7f4; --hover: #e8f5ee;
  --codd: #f6f5f2; --ceven: #efede9;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* ── HERO ── */
.hero-band{background:linear-gradient(135deg,var(--hero-bg1) 0%,var(--hero-bg2) 55%,var(--hero-bg3) 100%);position:sticky;top:0;z-index:101;border-bottom:none;}
.hero-band::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 140% at 65% 50%,var(--hband-glow) 0%,transparent 70%);pointer-events:none;}
header{position:relative;max-width:1360px;margin:0 auto;padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.header-left{display:flex;align-items:center;gap:12px;}
.brand-pill{display:flex;align-items:center;gap:7px;padding:4px 12px;border:1px solid var(--hpill-border);background:var(--hpill-bg);backdrop-filter:blur(6px);}
.brand-pill.rj{background:linear-gradient(135deg,rgba(180,20,20,.75) 0%,rgba(180,20,20,.75) 30%,rgba(25,35,110,.75) 70%,rgba(25,35,110,.75) 100%);border-color:rgba(255,255,255,0.18);}
.brand-pill.ml{background:rgba(0,85,190,.65);border-color:rgba(255,255,255,0.18);}
.brand-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.brand-dot.rj{background:#ff6b6b;box-shadow:0 0 6px rgba(255,107,107,.7);}
.brand-dot.ml{background:#0055be;box-shadow:0 0 5px rgba(0,85,190,.4);}
.brand-name{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;}
.brand-pill.rj .brand-name{color:#ffffff;text-shadow:0 1px 3px rgba(0,0,0,.4);}
.brand-pill.rj .brand-name .rj-restaura{color:#ffffff;}
.brand-pill.rj .brand-name .rj-jeans{color:#ffffff;}
.brand-pill.ml .brand-name{color:#ffffff;text-shadow:0 1px 3px rgba(0,0,0,.3);}
.header-divider{width:1px;height:24px;background:var(--hdivider);}
.header-title h1{font-size:13px;font-weight:600;color:var(--htitle-h1);}
.header-title span{font-size:11px;color:var(--htitle-sub);}
.header-meta{font-size:11px;color:var(--hmeta);white-space:nowrap;}
.header-right{display:flex;align-items:center;gap:10px;}

/* ── METRICS BAND ── */
.metrics-band{background:linear-gradient(135deg,var(--hero-bg1) 0%,var(--hero-bg2) 55%,var(--hero-bg3) 100%);border-bottom:1px solid var(--hband-border);position:relative;}
.metrics-band::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 140% at 65% 50%,var(--hband-glow) 0%,transparent 70%);pointer-events:none;}
.metrics-inner{position:relative;max-width:1360px;margin:0 auto;padding:.9rem 2rem 1.3rem;display:grid;grid-template-columns:4fr 8fr;gap:10px;align-items:stretch;}
.metrics-left{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;}
.metrics-right{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* stat cards */
.metric{padding:15px 17px;background:var(--mc-bg);border:1px solid var(--mc-border);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:space-between;}
.metric .lbl{font-size:9px;font-weight:600;color:var(--mc-lbl);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.metric .val{font-size:30px;font-weight:700;line-height:1;color:var(--mc-val);}
.metric .sub{font-size:10px;color:var(--mc-sub);margin-top:4px;}
.metric .val.green{color:var(--teal-mid);}
.metric .val.amber{color:#4f5fc4;}
.metric .val.blue{color:var(--blue);}
.metric .val.purple{color:var(--purple);}

/* spotlight */
.spotlight{background:var(--mc-bg);border:1px solid var(--mc-border);backdrop-filter:blur(8px);display:flex;flex-direction:column;overflow:hidden;}
.spotlight-hdr{padding:9px 15px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--sp-inner);}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-dot.gl{background:#e05555;box-shadow:0 0 5px rgba(224,85,85,.6);}
.s-dot.pgl{background:#f5a623;box-shadow:0 0 5px rgba(245,166,35,.6);}
.s-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mc-lbl);}
.spotlight-item{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;gap:8px;border-bottom:1px solid var(--sp-item);flex:1;}
.spotlight-item:last-child{border-bottom:none;}
.s-loja{font-size:12px;font-weight:600;color:var(--sp-loja);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-loja small{display:block;font-size:10px;font-weight:400;color:var(--sp-sub);margin-top:1px;}
.s-date{font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.s-date.gl{color:#c0392b;} .s-date.pgl{color:#4f5fc4;}
.spotlight-empty{padding:13px 15px;font-size:11px;color:var(--sp-empty);font-style:italic;}

/* ── MAIN ── */
main{max-width:1360px;margin:0 auto;padding:1.5rem 2rem 3rem;}
.toolbar{display:flex;gap:7px;margin-bottom:1rem;align-items:center;flex-wrap:wrap;}
.toolbar input,.toolbar select{font-family:var(--font);font-size:12px;padding:6px 10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;transition:border .15s;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--teal-mid);}
.toolbar input{width:180px;}
.tabs{display:flex;background:var(--surface2);border:1px solid var(--border);overflow:hidden;}
.tab{font-family:var(--font);font-size:12px;font-weight:500;padding:6px 13px;border:none;background:transparent;cursor:pointer;color:var(--text2);transition:background .15s,color .15s;}
.tab.on{background:var(--surface);color:var(--text);}
.btn-add{margin-left:auto;font-family:var(--font);font-size:12px;font-weight:600;padding:6px 15px;border:1px solid var(--teal-mid);background:var(--teal-bg);color:var(--teal);cursor:pointer;}
.btn-add:hover{background:var(--teal-mid);color:#fff;}
.btn-export{font-family:var(--font);font-size:12px;padding:6px 12px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.btn-export:hover{background:var(--surface2);}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--surface2);padding:8px 11px;text-align:left;font-weight:600;font-size:10px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;}
thead th:hover{background:var(--border);}
thead th.sorted .sa{color:var(--teal-mid);opacity:1;}
.sa{font-size:9px;margin-left:3px;opacity:.3;}
tbody tr{border-bottom:1px solid var(--border);transition:background .08s;cursor:pointer;}
tbody tr:nth-child(odd){background:var(--odd);}
tbody tr:nth-child(even){background:var(--even);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--hover)!important;}
tbody tr.overdue{border-left:3px solid #e05555;}
tbody tr.overdue td:first-child{padding-left:9px;}
td{padding:8px 11px;vertical-align:middle;}
td.loja-cell{font-weight:600;min-width:130px;}
td.loja-cell .sub{font-size:10px;font-weight:400;color:var(--text3);}
td.num-cell{color:var(--text3);font-size:11px;white-space:nowrap;}
td.obs-cell{color:var(--text3);font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.days-cell{font-size:11px;white-space:nowrap;font-weight:600;}
td.days-cell.overdue{color:#e05555;}
td.days-cell.soon{color:#6366f1;}
td.days-cell.ok{color:var(--teal-mid);}
td.days-cell.none{color:var(--text3);font-weight:400;}

/* BADGE */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;letter-spacing:.02em;}
.badge.agendado{background:var(--teal-bg);color:var(--teal);}
.badge.aberto{background:var(--amber-bg);color:var(--amber);}
.badge.concluido{background:var(--blue-bg);color:var(--blue);}

/* RESPONSIBLE badge */
.resp-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;background:var(--purple-bg);color:var(--purple);white-space:nowrap;}

/* FLOW */
.flow{display:flex;align-items:center;}
.step{display:flex;align-items:center;}
.step-box{width:20px;height:20px;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;flex-shrink:0;}
.step-box.done{background:var(--teal-mid);border-color:var(--teal-mid);color:#fff;}
.step-box.locked{background:var(--surface2);border-color:var(--border);color:var(--text3);cursor:not-allowed;}
.step-box.next{border-color:var(--amber-mid);background:var(--amber-bg);color:var(--amber);}
.step-connector{width:8px;height:2px;background:var(--border2);flex-shrink:0;}
.step-connector.done{background:var(--teal-mid);}

/* PROGRESS */
.prog-wrap{display:none;}

/* FASE VIEW */
.fase-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fase-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.fase-hdr{padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fase-hdr .ftitle{font-size:12px;font-weight:600;}
.fase-hdr .fcounts{font-size:10px;color:var(--text3);}
.fase-row{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-bottom:1px solid var(--border);font-size:11px;}
.fase-row:last-child{border-bottom:none;}
.fase-row .fn{font-weight:500;}
.fase-sem{padding:7px 13px;font-size:11px;color:var(--text3);font-style:italic;}

/* CONCLUDED */
.concluded-section{margin-top:2rem;}
.concluded-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 0 8px;border-top:1px solid var(--border);user-select:none;}
.concluded-toggle .ct-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.concluded-toggle .ct-count{font-size:10px;background:var(--blue-bg);color:var(--blue);padding:2px 8px;font-weight:600;}
.concluded-toggle .ct-arrow{font-size:11px;color:var(--text3);margin-left:auto;transition:transform .2s;}
.concluded-toggle.open .ct-arrow{transform:rotate(180deg);}
.concluded-body{display:none;}
.concluded-body.open{display:block;}
.concluded-table tbody tr:nth-child(odd){background:var(--codd);}
.concluded-table tbody tr:nth-child(even){background:var(--ceven);}
.concluded-table td{color:var(--text3);}
.concluded-table td.loja-cell{color:var(--text2);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);width:660px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 12px 50px rgba(0,0,0,.25);}
.mhdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mhdr h2{font-size:15px;font-weight:700;}
.mhdr .xbtn{font-size:22px;cursor:pointer;color:var(--text3);border:none;background:none;line-height:1;padding:0 5px;}
.mhdr .xbtn:hover{background:var(--surface2);}
.mbody{padding:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.fg input,.fg select{font-family:var(--font);font-size:12px;padding:7px 9px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;transition:border .15s;}
.fg input:focus,.fg select:focus{border-color:var(--teal-mid);}
.fg textarea{font-family:var(--font);font-size:12px;padding:9px 11px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:140px;line-height:1.65;transition:border .15s;}
.fg textarea:focus{border-color:var(--teal-mid);}
.log-entry{font-size:12px;line-height:1.6;padding:8px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.log-entry:last-child{border-bottom:none;}
.log-ts{font-size:10px;color:var(--text3);font-weight:600;}
.log-text{color:var(--text2);}
.log-entry-actions{display:flex;gap:6px;margin-top:2px;}
.log-btn{font-family:var(--font);font-size:10px;padding:2px 8px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;}
.log-btn:hover{background:var(--surface2);color:var(--text);}
.log-btn.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bg);}
.log-edit-area{font-family:var(--font);font-size:12px;padding:6px 8px;border:1px solid var(--teal-mid);background:var(--surface);color:var(--text);resize:vertical;min-height:52px;width:100%;line-height:1.5;outline:none;}
.log-section{border:1px solid var(--border);min-height:160px;max-height:260px;overflow-y:auto;padding:4px 10px;margin-top:6px;background:var(--surface2);}
.add-note-row{display:flex;gap:6px;margin-top:8px;}
.add-note-row textarea{flex:1;font-family:var(--font);font-size:12px;padding:7px 9px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;resize:none;min-height:56px;line-height:1.5;}
.add-note-row textarea:focus{border-color:var(--teal-mid);}
.btn-note{font-family:var(--font);font-size:11px;font-weight:600;padding:7px 12px;border:1px solid var(--teal-mid);background:var(--teal-bg);color:var(--teal);cursor:pointer;white-space:nowrap;align-self:flex-end;}
.btn-note:hover{background:var(--teal-mid);color:#fff;}
.flow-section{margin-bottom:18px;}
.flow-section-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px;}
.flow-steps-modal{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);overflow:hidden;}
.fstep{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border);transition:background .15s;}
.fstep:last-child{border-bottom:none;}
.fstep.done-step{background:#eef9f4;}
.fstep.locked-step{background:var(--surface2);opacity:.55;}
.fstep.next-step{background:#f0f1fc;}
.fstep-check{margin-top:1px;flex-shrink:0;}
.fstep-check input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--teal-mid);}
.fstep-check input[type=checkbox]:disabled{cursor:not-allowed;}
.fstep-info{flex:1;}
.fstep-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.step-num{font-size:9px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:1px 5px;}
.lock-msg{font-size:10px;font-weight:400;color:var(--text3);font-style:italic;}
.fstep-date input{font-family:var(--font);font-size:11px;padding:4px 8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;width:180px;}
.fstep-date input:focus{border-color:var(--teal-mid);}
.fstep-date input:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}
.mfooter{padding:11px 20px 17px;display:flex;gap:7px;justify-content:flex-end;border-top:1px solid var(--border);}
.btn-save{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 20px;border:none;background:var(--teal-mid);color:#fff;cursor:pointer;}
.btn-save:hover{background:var(--teal);}
.btn-cancel{font-family:var(--font);font-size:12px;padding:7px 14px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;}
.btn-del{font-family:var(--font);font-size:12px;padding:7px 14px;border:1px solid var(--red-bg);background:var(--red-bg);color:var(--red);cursor:pointer;margin-right:auto;}
.no-results{padding:3rem;text-align:center;color:var(--text3);}

@media(max-width:900px){
  .metrics-inner{grid-template-columns:1fr;padding:0 1rem 1rem;}
  .fase-grid{grid-template-columns:1fr;}
  .db-stats{grid-template-columns:repeat(2,1fr);}
  main{padding:1rem;}
  header{padding:.75rem 1rem;}
  .page-nav-inner{padding:0 1rem;}
}

/* ── PAGE NAV ── */
.page-nav-band{background:linear-gradient(135deg,var(--hero-bg1) 0%,var(--hero-bg2) 55%,var(--hero-bg3) 100%);border-bottom:1px solid var(--hband-border);position:sticky;z-index:100;}
.page-nav-inner{max-width:1360px;margin:0 auto;padding:0 2rem;display:flex;gap:0;}
.page-tab{font-family:var(--font);font-size:12px;font-weight:500;padding:10px 18px;border:none;background:transparent;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.page-tab:hover{color:var(--text);}
.page-tab.on{color:var(--teal);border-bottom-color:var(--teal);font-weight:600;}
.page-tab.disabled{cursor:default;opacity:.45;}

/* ── DATABASE ── */
.db-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem;}
.db-stat{background:var(--surface);border:1px solid var(--border);padding:13px 15px;}
.db-stat .lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.db-stat .val{font-size:24px;font-weight:700;color:var(--text);}
.db-stat .val.green{color:var(--teal-mid);}
.db-stat .val.indigo{color:#4f5fc4;}
.db-stat .val.gray{color:var(--text3);}
.db-stat .sub{font-size:10px;color:var(--text3);margin-top:3px;}
.db-toolbar{display:flex;gap:7px;margin-bottom:1rem;align-items:center;flex-wrap:wrap;}
.db-toolbar input,.db-toolbar select{font-family:var(--font);font-size:12px;padding:6px 10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;}
.db-toolbar input:focus,.db-toolbar select:focus{border-color:var(--teal-mid);}
.db-toolbar input{width:200px;}
.rede-rj{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;background:linear-gradient(135deg,rgba(180,20,20,1) 0%,rgba(180,20,20,1) 30%,rgba(25,35,110,1) 70%,rgba(25,35,110,1) 100%);color:#ffffff;letter-spacing:.04em;}
.rede-ml{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;background:rgba(0,85,190,1);color:#ffffff;letter-spacing:.04em;}

  const v4 = localStorage.getItem('golive_v8');
  if(v4) { lojas = JSON.parse(v4); return; }
  // no local data — use embedded backup
  lojas = JSON.parse(JSON.stringify(EMBEDDED_GOLIVE));
  save();
}

function saveAll() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    golive: lojas,
    lojas: dbExtra,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'presence_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Backup completo salvo!');
}

function saveJSON() {
  const blob=new Blob([JSON.stringify(lojas,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='golives_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(a.href);
}
function loadJSON(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      // unified backup format
      if(d.golive && d.lojas) {
        lojas = d.golive;
        dbExtra = d.lojas;
        save(); saveDb();
        render();
        showToast(`Backup restaurado: ${lojas.length} go-lives, ${dbExtra.length} lojas.`);
      } else if(Array.isArray(d)) {
        // legacy: go-live only
        lojas=d; save(); render();
        showToast(lojas.length+' go-lives carregados.');
      } else throw 0;
    } catch { showToast('Arquivo inválido.',true); }
    e.target.value='';
  };
  r.readAsText(file);
}
function showToast(msg,err=false) {
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${err?'#8b1a1a':'#158a61'};color:#fff;font-family:var(--font);font-size:12px;padding:9px 18px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:none;opacity:1;transition:opacity .4s;`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},2600);
}

function parseDate(s) {
  if(!s) return null;
  const p=s.trim().split(' ')[0].split('/');
  if(p.length<3) return null;
  const d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  return d;
}
function fmtDate(s) {
  if(!s) return null; const d=parseDate(s); if(!d) return s;
  const day=String(d.getDate()).padStart(2,'0');
  const mon=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][d.getMonth()];
  const time=s.includes(' ')?' '+s.trim().split(' ')[1]:'';
  return `${day}/${mon}${time}`;
}
function daysDiff(s) { const d=parseDate(s); if(!d) return null; return Math.round((d-TODAY)/86400000); }
function isOverdue(l) { return l.status!=='concluido' && l.goLive && daysDiff(l.goLive)<0; }

function daysCell(s) {
  if(!s) return `<td class="days-cell none">—</td>`;
  const d=daysDiff(s);
  if(d===null) return `<td class="days-cell none">—</td>`;
  if(d<0) return `<td class="days-cell overdue">atrasado ${Math.abs(d)}d</td>`;
  if(d===0) return `<td class="days-cell soon">hoje</td>`;
  if(d<=7) return `<td class="days-cell soon">em ${d}d</td>`;
  return `<td class="days-cell ok">em ${d}d</td>`;
}

function badgeHtml(s) {
  const m={agendado:'Cronograma',aberto:'Aguardando',concluido:'Go-Live Finalizado'};
  return `<span class="badge ${s}">${m[s]||s}</span>`;
}
function respHtml(r) {
  if(!r) return '';
  return `<span class="resp-badge">${r.split(' ')[0]}</span>`;
}

function flowHtml(l) {
  const done=stepsDone(l);
  let h='<div class="flow">';
  for(let i=0;i<FASES.length;i++){
    if(i>0) h+=`<div class="step-connector${done[i-1]?' done':''}"></div>`;
    const isDone=done[i],isNext=!isDone&&(i===0||done[i-1]);
    const cls=isDone?'done':isNext?'next':'locked';
    const icon=isDone?'✓':isNext?'·':'·';
    h+=`<div class="step"><div class="step-box ${cls}" title="${FASES[i].label}${l[FASES[i].key]?' — '+fmtDate(l[FASES[i].key]):''}">${icon}</div></div>`;
  }
  return h+'</div>';
}
function progHtml(l) {
  const n=countDone(l),pct=Math.round(n/FASES.length*100);
  return `<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-lbl">${n}/5</div></div>`;
}

function getFiltered() {
  const q=document.getElementById('q-busca').value.toLowerCase();
  const st=document.getElementById('q-status').value;
  const resp=document.getElementById('q-resp').value;
  const mes=document.getElementById('q-mes').value;
  return lojas.filter(l=>{
    if(q&&!l.loja.toLowerCase().includes(q)&&!l.grupo.toLowerCase().includes(q)&&!(l.franqueado||'').toLowerCase().includes(q)&&!l.num.includes(q)) return false;
    if(st&&l.status!==st) return false;
    if(resp&&l.responsavel!==resp) return false;
    if(mes){const d=parseDate(l.goLive);if(!d||d.getMonth()!==parseInt(mes)) return false;}
    return true;
  }).sort((a,b)=>{
    const da=parseDate(a.goLive),db=parseDate(b.goLive);
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
    return da-db;
  });
}

function renderMetrics(list) {
  const ag=list.filter(l=>l.status==='agendado').length;
  const ab=list.filter(l=>l.status==='aberto').length;
  const co=list.filter(l=>l.status==='concluido').length;
  const at=list.filter(l=>isOverdue(l)).length;
  const proxGL=list.filter(l=>l.goLive&&daysDiff(l.goLive)>=0).sort((a,b)=>parseDate(a.goLive)-parseDate(b.goLive)).slice(0,2);
  const proxPGL=list.filter(l=>l.preGoLive&&daysDiff(l.preGoLive)>=0).sort((a,b)=>parseDate(a.preGoLive)-parseDate(b.preGoLive)).slice(0,2);
  const glItems=proxGL.length?proxGL.map(l=>{
    const isToday = daysDiff(l.goLive)===0;
    const time = l.goLive.includes(' ') ? l.goLive.trim().split(' ')[1] : '';
    const dateLabel = isToday
      ? `<span style="color:#158a61;font-size:11px;font-weight:800;letter-spacing:.04em;">HOJE${time?' — '+time:''}</span>`
      : fmtDate(l.goLive);
    return `<div class="spotlight-item"><div class="s-loja">${l.loja}<small>${l.responsavel||l.grupo}</small></div><div class="s-date gl">${dateLabel}</div></div>`;
  }).join(''):`<div class="spotlight-empty">Nenhum agendado.</div>`;
  const pglItems=proxPGL.length?proxPGL.map(l=>`<div class="spotlight-item"><div class="s-loja">${l.loja}<small>${l.responsavel||l.grupo}</small></div><div class="s-date pgl">${fmtDate(l.preGoLive)}</div></div>`).join(''):`<div class="spotlight-empty">Nenhum agendado.</div>`;
  document.getElementById('metrics').innerHTML=`
    <div class="metrics-left">
      <div class="metric"><div class="lbl">Lojas</div><div class="val">${list.length}</div><div class="sub">em implantação</div></div>
      <div class="metric"><div class="lbl">Cronograma</div><div class="val green">${ag}</div><div class="sub">confirmado</div></div>
      <div class="metric"><div class="lbl">Aguardando</div><div class="val amber">${ab}</div><div class="sub">pendente</div></div>
      <div class="metric"><div class="lbl">Go-Live Finalizado</div><div class="val blue">${co}</div><div class="sub">${at>0?`<span style="color:#f07070">▲ ${at} atrasado${at>1?'s':''}</span>`:'em dia'}</div></div>
    </div>
    <div class="metrics-right">
      <div class="spotlight"><div class="spotlight-hdr"><div class="s-dot gl"></div><span class="s-title">Próximos go-lives</span></div>${glItems}</div>
      <div class="spotlight"><div class="spotlight-hdr"><div class="s-dot pgl"></div><span class="s-title">Próximos pré go-lives</span></div>${pglItems}</div>
    </div>`;
}

function sortBy(col){sortAsc=sortCol===col?!sortAsc:true;sortCol=col;render();}

function renderLista(list){
  if(!list.length) return `<div class="table-wrap"><div class="no-results">Nenhuma loja encontrada.</div></div>`;
  const sorted=[...list].sort((a,b)=>{
    let va=a[sortCol]||'',vb=b[sortCol]||'';
    if(['goLive','treinLoja','treinRetag','preGoLive'].includes(sortCol)){
      const da=parseDate(va),db=parseDate(vb);
      if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
      return sortAsc?da-db:db-da;
    }
    return sortAsc?va.localeCompare(vb,'pt'):vb.localeCompare(va,'pt');
  });
  const th=(col,lbl)=>{const on=sortCol===col?' sorted':'';const arr=sortCol===col?(sortAsc?'▲':'▼'):'⇅';return `<th class="${on}" onclick="sortBy('${col}')">${lbl}<span class="sa">${arr}</span></th>`;};
  const rows=sorted.map(l=>{
    const idx=lojas.indexOf(l);
    const od=isOverdue(l)?' overdue':'';
    return `<tr class="${od}" onclick="openModal(${idx})">
      <td class="loja-cell">${l.loja}<div class="sub">${l.franqueado?`<b>${l.franqueado}</b> · `:''} ${l.grupo}</div></td>
      <td class="num-cell">${l.num}</td>
      <td>${badgeHtml(l.status)}</td>
      <td>${l.responsavel?respHtml(l.responsavel):'<span style="color:var(--text3);font-size:10px">—</span>'}</td>
      <td>${flowHtml(l)}</td>
      ${daysCell(l.goLive)}
      <td class="obs-cell" title="${(l.log||'').replace(/"/g,'&quot;')}">${(l.log||'').split('\n').pop().replace(/\[\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}\] /,'').substring(0,65)}…</td>
    </tr>`;
  }).join('');
  return `<div class="table-wrap"><table>
    <thead><tr>${th('loja','Loja')}${th('num','Nº')}${th('status','Status')}<th>Consultor</th><th>Fluxo</th>${th('goLive','Go-live')}<th>Última anotação</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function renderFase(list){
  return `<div class="fase-grid">${FASES.map((f,fi)=>{
    const com=list.filter(l=>stepsDone(l)[fi]).sort((a,b)=>(parseDate(a[f.key])||0)-(parseDate(b[f.key])||0));
    const sem=list.filter(l=>!stepsDone(l)[fi]);
    return `<div class="fase-card"><div class="fase-hdr"><span class="ftitle">Etapa ${fi+1} — ${f.label}</span><span class="fcounts">${com.length} ok · ${sem.length} pendentes</span></div>
      ${com.map(l=>`<div class="fase-row"><span class="fn">${l.loja}</span><span style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--teal)">✓ ${fmtDate(l[f.key])||''}${l.responsavel?` <span style="color:var(--text3)">· ${l.responsavel.split(' ')[0]}</span>`:''}</span></div>`).join('')}
      ${sem.length?`<div class="fase-sem">Pendentes: ${sem.map(l=>l.loja).join(', ')}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderTimeline(list){
  const withDate=list.filter(l=>l.goLive).sort((a,b)=>parseDate(a.goLive)-parseDate(b.goLive));
  if(!withDate.length) return `<div class="no-results">Nenhuma loja com go-live agendado.</div>`;
  const months={};
  withDate.forEach(l=>{
    const d=parseDate(l.goLive); if(!d) return;
    const key=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    if(!months[key]) months[key]=[];
    months[key].push(l);
  });
  return Object.entries(months).map(([month,items])=>`
    <div style="margin-bottom:1.5rem;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">${month}</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${items.map(l=>{
          const idx=lojas.indexOf(l);
          const od=isOverdue(l);
          const diff=daysDiff(l.goLive);
          const diffTxt=diff===null?'':diff<0?`<span style="color:#e05555;font-size:10px;font-weight:600;">atrasado ${Math.abs(diff)}d</span>`:diff===0?`<span style="color:#6366f1;font-size:10px;font-weight:600;">hoje</span>`:`<span style="color:var(--teal-mid);font-size:10px;">em ${diff}d</span>`;
          return `<div onclick="openModal(${idx})" style="display:flex;align-items:center;gap:12px;padding:9px 13px;background:var(--surface);border:1px solid ${od?'#e05555':'var(--border)'};cursor:pointer;transition:background .1s;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='var(--surface)'">
            <div style="width:52px;flex-shrink:0;font-size:13px;font-weight:700;color:${od?'#e05555':'var(--text)'};">${fmtDate(l.goLive).split(' ')[0]}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:600;">${l.loja}</div>
              <div style="font-size:10px;color:var(--text3);">${l.franqueado?l.franqueado+' · ':''}${l.grupo}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">${diffTxt}${badgeHtml(l.status)}${l.responsavel?respHtml(l.responsavel):''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function render(){
  const list=getFiltered();
  const active=list.filter(l=>l.status!=='concluido');
  const concluded=list.filter(l=>l.status==='concluido');
  renderMetrics(list);
  let html='';
  if(currentView==='lista') html=renderLista(active);
  else if(currentView==='fase') html=renderFase(active);

  if(concluded.length&&currentView!=='timeline') html+=renderConcluded(concluded);
  document.getElementById('main-content').innerHTML=html;

function buildFlowSteps(l){
  const done=stepsDone(l); let html='';
  for(let i=0;i<FASES.length;i++){
    const f=FASES[i];
    const isDone=done[i], canEdit=i===0||done[i-1];
    const cls=isDone?'done-step':canEdit?'next-step':'locked-step';
    const lockMsg=!canEdit?`aguardando: ${FASES[i-1].label}`:'';
    const curVal=l[f.key]||'';
    const ph=FASE_DEFAULTS[i]?`DD/MM/AAAA ${FASE_DEFAULTS[i]}`:'DD/MM/AAAA HH:MM';
    const dateField=f.checkOnly
      ? `<div class="fstep-date" style="font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;">${isDone?'✓ Concluída':'Marque quando instalado'}</div>`
      : `<div class="fstep-date"><input type="text" id="fdate-${i}" value="${curVal}" placeholder="${ph}" ${!canEdit?'disabled':''} oninput="onDateInput(${i})"/></div>`;
    html+=`<div class="fstep ${cls}" id="fstep-${i}">
      <div class="fstep-check">
        <input type="checkbox" id="fcheck-${i}" ${isDone?'checked':''} ${!canEdit?'disabled':''}
          onchange="onStepCheck(${i})"/>
      </div>
      <div class="fstep-info">
        <div class="fstep-label">
          <span class="step-num">${i+1}</span>${f.label}
          ${lockMsg?`<span class="lock-msg">(${lockMsg})</span>`:''}
        </div>
        ${dateField}
      </div>
    </div>`;
  }
  return html;
}

function onStepCheck(i){
  const f=FASES[i];
  const chk=document.getElementById('fcheck-'+i);

  if(f.checkOnly){
    // no date required — just toggle
    if(!chk.checked){
      for(let j=i+1;j<FASES.length;j++){
        const nc=document.getElementById('fcheck-'+j);
        const nd=document.getElementById('fdate-'+j);
        if(nc){nc.checked=false;nc.disabled=true;}
        if(nd){nd.value='';nd.disabled=true;}
        document.getElementById('fstep-'+j).className='fstep locked-step';
      }
    } else {
      unlockNext(i);
    }
    refreshStepStyles();
    return;
  }

  // steps with date
  const dateInput=document.getElementById('fdate-'+i);
  if(chk.checked){
    const v=dateInput.value.trim();
    if(!v){
      chk.checked=false;
      dateInput.focus();
      dateInput.style.borderColor='#e05555';
      setTimeout(()=>dateInput.style.borderColor='',1800);
      showToast('Insira a data antes de marcar a etapa.',true);
      return;
    }
    unlockNext(i);
  } else {
    dateInput.value='';
    for(let j=i+1;j<FASES.length;j++){
      const nc=document.getElementById('fcheck-'+j);
      const nd=document.getElementById('fdate-'+j);
      if(nc){nc.checked=false;nc.disabled=true;}
      if(nd){nd.value='';nd.disabled=true;}
      document.getElementById('fstep-'+j).className='fstep locked-step';
    }
  }
  refreshStepStyles();
}

function onDateInput(i){
  const v=document.getElementById('fdate-'+i).value.trim();
  const c=document.getElementById('fcheck-'+i);
  if(v.length>=8){
    // auto-append default time if user typed only a date (10 chars = DD/MM/AAAA)
    if(v.length===10 && FASE_DEFAULTS[i] && !v.includes(' ')){
      document.getElementById('fdate-'+i).value=v+' '+FASE_DEFAULTS[i];
    }
    if(!c.checked){
      c.checked=true;
      unlockNext(i);
      refreshStepStyles();
    }
  } else {
    if(c.checked){
      c.checked=false;
      // lock subsequent
      for(let j=i+1;j<FASES.length;j++){
        const nc=document.getElementById('fcheck-'+j);
        const nd=document.getElementById('fdate-'+j);
        if(nc){nc.checked=false;nc.disabled=true;}
        if(nd){nd.value='';nd.disabled=true;}
        document.getElementById('fstep-'+j).className='fstep locked-step';
      }
      refreshStepStyles();
    }
  }
}

function unlockNext(i){
  if(i+1<FASES.length){
    const nc=document.getElementById('fcheck-'+(i+1));
    const nd=document.getElementById('fdate-'+(i+1));
    if(nc)nc.disabled=false;
    if(nd)nd.disabled=false;
    document.getElementById('fstep-'+(i+1)).className='fstep next-step';
  }
}

function refreshStepStyles(){
  for(let i=0;i<FASES.length;i++){
    const c=document.getElementById('fcheck-'+i);
    const el=document.getElementById('fstep-'+i);
    if(!el||!c) continue;
    el.className='fstep '+(c.checked?'done-step':c.disabled?'locked-step':'next-step');
  }
}

function parseLogEntries(log){
  if(!log) return [];
  return log.split('\n').filter(Boolean).map(e=>{
    const m=e.match(/^\[(.+?)\] (.+)$/s);
    return m?{ts:m[1],text:m[2]}:{ts:'',text:e};
  });
}
function entriesToLog(entries){
  return entries.map(e=>e.ts?`[${e.ts}] ${e.text}`:e.text).join('\n');
}
function buildLogView(log){
  const entries=parseLogEntries(log);
  if(!entries.length) return '<div style="color:var(--text3);font-size:11px;font-style:italic;padding:10px 0;">Nenhuma anotação ainda.</div>';
  return [...entries].reverse().map((e,ri)=>{
    const realIdx=entries.length-1-ri;
    return `<div class="log-entry" id="lentry-${realIdx}">
      ${e.ts?`<div class="log-ts">${e.ts}</div>`:''}
      <div class="log-text" id="ltext-${realIdx}">${e.text}</div>
      <div class="log-entry-actions">
        <button class="log-btn" onclick="editEntry(${realIdx})">Editar</button>
        <button class="log-btn del" onclick="deleteEntry(${realIdx})">Excluir</button>
      </div>
    </div>`;
  }).join('');
}
window.editEntry = function(idx){
  const lv=document.getElementById('log-view');
  const entries=parseLogEntries(lv.dataset.log||'');
  const e=entries[idx];
  const entryEl=document.getElementById('lentry-'+idx);
  const textEl=document.getElementById('ltext-'+idx);
  // replace text + actions with inline editor
  textEl.style.display='none';
  entryEl.querySelector('.log-entry-actions').style.display='none';
  const editor=document.createElement('textarea');
  editor.className='log-edit-area';
  editor.value=e.text;
  entryEl.appendChild(editor);
  editor.focus();
  const saveBtn=document.createElement('button');
  saveBtn.className='log-btn'; saveBtn.textContent='Salvar';
  saveBtn.style.marginTop='4px';
  const cancelBtn=document.createElement('button');
  cancelBtn.className='log-btn'; cancelBtn.textContent='Cancelar';
  cancelBtn.style.marginTop='4px';
  const btnRow=document.createElement('div');
  btnRow.style.display='flex'; btnRow.style.gap='6px'; btnRow.style.marginTop='4px';
  btnRow.appendChild(saveBtn); btnRow.appendChild(cancelBtn);
  entryEl.appendChild(btnRow);
  saveBtn.onclick=()=>{
    entries[idx].text=editor.value.trim()||e.text;
    lv.dataset.log=entriesToLog(entries);
    lv.innerHTML=buildLogView(lv.dataset.log);
  };
  cancelBtn.onclick=()=>{ lv.innerHTML=buildLogView(lv.dataset.log); };
}
window.deleteEntry = function(idx){
  const lv = document.getElementById('log-view');
  const entryEl = document.getElementById('lentry-'+idx);
  if(!entryEl) return;
  // inline confirm
  if(entryEl.querySelector('.del-confirm')) return; // already showing
  const bar = document.createElement('div');
  bar.className = 'del-confirm';
  bar.style.cssText = 'display:flex;gap:6px;align-items:center;margin-top:4px;';
  bar.innerHTML = `<span style="font-size:11px;color:var(--text2);">Excluir esta anotação?</span>
    <button class="log-btn del" onclick="confirmDelete(${idx})">Sim, excluir</button>
    <button class="log-btn" onclick="this.closest('.del-confirm').remove()">Cancelar</button>`;
  entryEl.appendChild(bar);
};
window.confirmDelete = function(idx){
  const lv = document.getElementById('log-view');
  const entries = parseLogEntries(lv.dataset.log||'');
  entries.splice(idx,1);
  lv.dataset.log = entriesToLog(entries);
  lv.innerHTML = buildLogView(lv.dataset.log);
};
function addNote(){
  const txt=document.getElementById('f-note-input').value.trim();
  if(!txt) return;
  const now=new Date();
  const ts=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const entry=`[${ts}] ${txt}`;
  const lv=document.getElementById('log-view');
  const existing=lv.dataset.log||'';
  const newLog=existing?existing+'\n'+entry:entry;
  lv.dataset.log=newLog;
  lv.innerHTML=buildLogView(newLog);
  document.getElementById('f-note-input').value='';
}

  dbModalIdx = idx;
  const del = document.getElementById('db-btn-del');
  const l = idx===-1 ? {nome:'',num:'',rede:'rj',status:'antigo',obs:''} : database[idx];
  document.getElementById('db-mtitle').textContent = idx===-1 ? 'Nova loja' : 'Editar — '+l.nome;
  document.getElementById('db-idx').value = idx;
  document.getElementById('db-nome').value = l.nome||'';
  document.getElementById('db-num').value = l.num||'';
  document.getElementById('db-obs').value = l.obs||'';
  document.getElementById('db-status').value = l.status||'antigo';
  document.getElementById('db-alerta').checked = !!l.alerta;
  setRede(l.rede||'rj');
  del.style.display = idx===-1 ? 'none' : 'block';
  document.getElementById('overlay-db').classList.add('open');
}
function closeDbModal() { document.getElementById('overlay-db').classList.remove('open'); }
function closeDbOut(e) { if(e.target===document.getElementById('overlay-db')) closeDbModal(); }
function saveDbLoja() {
  if(!document.getElementById('db-nome').value.trim()) { alert('Informe o nome da loja.'); return; }
  const obj = {
    nome: document.getElementById('db-nome').value.trim().toUpperCase(),
    num:  document.getElementById('db-num').value.trim(),
    rede: document.getElementById('db-rede').value,
    status: document.getElementById('db-status').value,
    obs: document.getElementById('db-obs').value.trim(),
    alerta: document.getElementById('db-alerta').checked,
    responsavel: 'Maiara',
  };
  const idx = parseInt(document.getElementById('db-idx').value);
  if(idx===-1) dbExtra.push(obj); else dbExtra[idx]=obj;
  saveDb(); closeDbModal(); renderDb();
}
function deleteDbLoja() {
  if(dbModalIdx<0) return;
  if(!confirm(`Excluir "${dbExtra[dbModalIdx].nome}"?`)) return;
  dbExtra.splice(dbModalIdx,1);
  saveDb(); closeDbModal(); renderDb();
}

// fix page-nav sticky top to match hero-band height
function fixNavTop() {
  const h = document.querySelector('.hero-band').offsetHeight;
  document.querySelector('.page-nav-band').style.top = h + 'px';
}
fixNavTop();
window.addEventListener('resize', fixNavTop);

// hide metrics on db page by default, init on gl
document.getElementById('metrics').style.display = '';
renderPage();
</script>
</body>
</html>
