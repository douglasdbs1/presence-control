<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Presence Control</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
<style>
:root{
  --bg:#f2f0ec;--surface:#fff;--surface2:#f7f5f1;--border:#e0ddd5;--border2:#c8c4bb;
  --text:#111110;--text2:#5c5a56;--text3:#9b9a92;
  --teal:#0a5c47;--teal-bg:#e0f5ec;--teal-mid:#158a61;
  --indigo:#2d3a8c;--indigo-bg:#e0e4f8;
  --red:#8b1a1a;--red-bg:#fce4e4;
  --blue:#103d7c;--blue-bg:#dceafa;
  --font:'Montserrat',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);font-weight:600;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

/* HEADER */
.topbar{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 24px;gap:10px;height:52px;}
.brand-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.brand-pill.rj{background:linear-gradient(90deg,rgba(176,18,18,.08),rgba(20,30,100,.08));color:#1a1917;}
.brand-pill.ml{background:rgba(0,85,190,.07);color:#1a1917;}
.brand-dot{width:6px;height:6px;border-radius:50%;}
.brand-dot.rj{background:linear-gradient(135deg,#c0392b,#19236e);}
.brand-dot.ml{background:#0055be;}
.divider{width:1px;height:22px;background:var(--border);margin:0 4px;}
.sys-title{font-size:13px;font-weight:600;color:var(--text);}
.sys-sub{font-size:11px;color:var(--text3);margin-left:6px;}
.spacer{flex:1;}
.topbar-date{font-size:11px;color:var(--text3);margin-right:4px;}
.btn-save-all{display:flex;align-items:center;gap:5px;font-family:var(--font);font-size:11px;font-weight:600;padding:5px 12px;border:1px solid var(--teal-mid);background:var(--teal-bg);color:var(--teal);border-radius:6px;cursor:pointer;}
.btn-save-all:hover{background:var(--teal-mid);color:#fff;}

/* PAGE NAV */
.page-nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:99;display:flex;padding:0 24px;}
.pnav-btn{font-family:var(--font);font-size:12px;font-weight:500;padding:10px 14px;border:none;background:transparent;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:5px;transition:color .15s;}
.pnav-btn .pnav-icon{font-size:13px;opacity:.75;}
.pnav-btn:hover{color:var(--text2);}
.pnav-btn.on{color:var(--teal-mid);border-bottom-color:var(--teal-mid);font-weight:600;}
.pnav-btn.disabled{cursor:default;opacity:.4;}

/* CONTENT */
.content{max-width:1360px;margin:0 auto;padding:20px 24px 60px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.stat .lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.stat .val{font-size:28px;font-weight:700;color:var(--text);line-height:1;}
.stat .sub{font-size:11px;color:var(--text3);margin-top:3px;}
.val.g{color:var(--teal-mid);}.val.i{color:var(--indigo);}.val.b{color:var(--blue);}

/* HOME CONTEXT */
.home-intro{background:#fff;border:1px solid var(--border);border-radius:10px;padding:15px 16px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;}
.home-kicker{font-size:10px;font-weight:700;color:var(--teal-mid);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.home-title{font-size:22px;font-weight:800;color:var(--text);line-height:1.05;}
.home-sub{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.45;max-width:720px;}
.home-focus{display:flex;gap:7px;align-items:center;justify-content:flex-end;flex-wrap:wrap;}
.focus-pill{font-size:10px;font-weight:700;padding:4px 8px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);white-space:nowrap;}
.focus-pill.hot{background:var(--red-bg);color:var(--red);border-color:#f2bcbc;}
.focus-pill.ok{background:var(--teal-bg);color:var(--teal);border-color:#b5e8d5;}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.action-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.action-hdr{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;background:var(--surface2);}
.action-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);}
.action-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid #f7f5f1;cursor:pointer;}
.action-item:last-child{border-bottom:none;}
.action-item:hover{background:#eef9f4;}
.action-name{font-size:12px;font-weight:700;color:var(--text);}
.action-name small{display:block;font-size:10px;font-weight:400;color:var(--text3);margin-top:1px;}
.action-tag{font-size:10px;font-weight:700;white-space:nowrap;}
.action-empty{padding:11px 14px;font-size:11px;color:var(--text3);font-style:italic;}
@media(max-width:800px){.home-intro{grid-template-columns:1fr;}.home-focus{justify-content:flex-start;}.action-row{grid-template-columns:1fr;}}

/* SPOTLIGHT */
.spot-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.spot-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.spot-hdr{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.spot-dot{width:6px;height:6px;border-radius:50%;}
.spot-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);}
.spot-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #f7f5f1;gap:8px;}
.spot-item:last-child{border-bottom:none;}
.spot-name{font-size:12px;font-weight:600;color:var(--text);}
.spot-name small{display:block;font-size:10px;font-weight:400;color:var(--text3);margin-top:1px;}
.spot-date{font-size:12px;font-weight:700;white-space:nowrap;}
.spot-empty{padding:11px 14px;font-size:11px;color:var(--text3);font-style:italic;}

/* TOOLBAR */
.toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.tb-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.kb-card.stub-card{border-left:3px solid #b5e8d5;}
.stub-row td{opacity:.85;}
.tag-db{font-size:9px;font-weight:600;padding:1px 5px;background:#e6f8ef;color:var(--teal);border-radius:3px;border:1px solid #b5e8d5;}
.view-tabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.vtab{font-family:var(--font);font-size:11px;font-weight:500;padding:6px 12px;border:none;background:transparent;cursor:pointer;color:var(--text2);}
.vtab.on{background:#fff;color:var(--text);}
input.tb,select.tb{font-family:var(--font);font-size:12px;padding:6px 10px;border:1px solid var(--border2);background:#fff;color:#111110;border-radius:6px;outline:none;caret-color:#111110;}
input.tb{width:180px;color:#111110;}
input.tb:focus,select.tb:focus{border-color:var(--teal-mid);}
.btn-sm{font-family:var(--font);font-size:11px;padding:5px 10px;border:1px solid var(--border2);background:#fff;color:var(--text2);border-radius:6px;cursor:pointer;}
.btn-sm:hover{background:var(--surface2);}
.btn-add{margin-left:auto;font-family:var(--font);font-size:12px;font-weight:600;padding:6px 14px;border:1px solid var(--teal-mid);background:var(--teal-bg);color:var(--teal);border-radius:6px;cursor:pointer;}
.btn-add:hover{background:var(--teal-mid);color:#fff;}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start;}
.kb-col{background:#f0ede8;border-radius:10px;padding:10px;}
.kb-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.kb-col-name{font-size:11px;font-weight:600;color:var(--text2);}
.kb-col-cnt{font-size:10px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:1px 7px;color:var(--text3);}
.kb-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .12s;}
.kb-card:last-child{margin-bottom:0;}
.kb-card:hover{border-color:var(--teal-mid);}
.kb-card.overdue{border-left:3px solid #c0392b;}
.kb-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;}
.kb-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
.kb-date{font-size:10px;color:var(--text3);}
.kb-date.today{color:var(--teal-mid);font-weight:700;}
.kb-prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.kb-prog-f{height:100%;background:var(--teal-mid);}
.kb-empty{padding:10px;text-align:center;font-size:11px;color:var(--text3);}

/* DASHBOARD */
.dash-section{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.dash-sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;background:var(--surface2);border-bottom:1px solid var(--border);}
.dash-sec-hdr:hover{background:#eef9f4;}
.dash-sec-title{font-size:12px;font-weight:700;color:var(--text);}
.dash-sec-cnt{font-size:11px;font-weight:600;background:#fff;border:1px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--text2);}
.dash-arrow{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;}
.dash-arrow.open{transform:rotate(180deg);}
.dash-body{display:none;}
.dash-body.open{display:block;}
.dash-row{display:grid;grid-template-columns:90px 1fr auto 100px;gap:10px;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.dash-row:last-child{border-bottom:none;}
.dash-row:hover{background:#eef9f4!important;}
.dash-row.dash-overdue{border-left:3px solid #c0392b;}
.dash-date{font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;}
.dash-name{font-size:12px;font-weight:600;color:var(--text);}
.dash-tags{display:flex;gap:4px;align-items:center;}
.dash-meta{font-size:11px;font-weight:600;text-align:right;white-space:nowrap;}
.dash-empty{padding:12px 16px;font-size:11px;color:var(--text3);font-style:italic;}
@media(max-width:800px){.dash-row{grid-template-columns:70px 1fr auto;}.dash-meta{display:none;}}

/* TAGS */
.tag-rj{font-size:9px;font-weight:700;padding:1px 5px;background:linear-gradient(90deg,#b41414,#19236e);color:#fff;}
.tag-ml{font-size:9px;font-weight:700;padding:1px 5px;background:#0055be;color:#fff;}
.tag-mega{font-size:9px;font-weight:700;padding:1px 5px;background:#0a5c47;color:#fff;}
.tag-resp{font-size:9px;font-weight:600;padding:1px 6px;background:var(--indigo-bg);color:var(--indigo);border-radius:3px;}
.store-num-pill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;line-height:1;padding:3px 6px;border-radius:999px;background:#f0ede8;color:var(--text3);border:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
.store-num-pill.before{margin-right:6px;}
.store-num-pill.after{margin-left:6px;}
.badge{display:inline-flex;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.badge.aberto{background:var(--indigo-bg);color:var(--indigo);}
.badge.agendado{background:var(--teal-bg);color:var(--teal);}
.badge.concluido{background:var(--blue-bg);color:var(--blue);}
.step-pill{display:inline-flex;font-size:10px;font-weight:700;padding:3px 7px;border-radius:999px;white-space:nowrap;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.step-pill.ok{background:var(--blue-bg);color:var(--blue);border-color:#b8d2ef;}
.step-pill.soon,.step-pill.scheduled{background:var(--teal-bg);color:var(--teal);border-color:#b5e8d5;}
.step-pill.pending{background:var(--indigo-bg);color:var(--indigo);border-color:#c4caef;}
.step-pill.risk{background:var(--red-bg);color:var(--red);border-color:#f2bcbc;}
.quick-tabs{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.qtab{font-family:var(--font);font-size:11px;font-weight:700;padding:5px 9px;border:1px solid var(--border);background:#fff;color:var(--text2);border-radius:999px;cursor:pointer;}
.qtab:hover{background:var(--surface2);}
.qtab.on{background:var(--text);border-color:var(--text);color:#fff;}

/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--surface2);padding:8px 11px;text-align:left;font-weight:600;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;}
thead th.sorted .sa{color:var(--teal-mid);opacity:1;}
.sa{font-size:9px;margin-left:3px;opacity:.3;}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
tbody tr:nth-child(odd){background:#fff;}
tbody tr:nth-child(even){background:#faf9f6;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#eef9f4!important;}
tbody tr.over{border-left:3px solid #c0392b;}
td{padding:8px 11px;vertical-align:middle;}
td.lc{font-weight:600;}
td.lc .sub{font-size:10px;font-weight:400;color:var(--text3);}
td.nc,td.oc{color:var(--text3);font-size:11px;}
td.oc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.flow-dots{display:flex;gap:2px;}
.fd{width:11px;height:11px;border-radius:2px;border:1.5px solid var(--border2);background:#fff;}
.fd.done{background:var(--teal-mid);border-color:var(--teal-mid);}
.fd.next{border-color:var(--indigo);}
.days-ok{color:var(--teal-mid);font-weight:600;font-size:11px;}
.days-near{color:var(--indigo);font-weight:600;font-size:11px;}
.days-over{color:#c0392b;font-weight:600;font-size:11px;}
.days-none{color:var(--text3);font-size:11px;}

/* FASE */
.fase-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fase-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.fase-hdr{padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fase-hdr .ft{font-size:12px;font-weight:600;}
.fase-hdr .fc{font-size:10px;color:var(--text3);}
.fase-row{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-bottom:1px solid var(--border);font-size:11px;}
.fase-row:last-child{border-bottom:none;}
.fase-row .fn{font-weight:500;}
.fase-sem{padding:7px 13px;font-size:11px;color:var(--text3);font-style:italic;}

/* TIMELINE */
.tl-month{margin-bottom:1.25rem;}
.tl-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.tl-item{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;}
.tl-item:hover{border-color:var(--teal-mid);}
.tl-dt{width:44px;font-size:13px;font-weight:700;flex-shrink:0;}
.tl-name{flex:1;font-size:12px;font-weight:600;}
.tl-name small{display:block;font-size:10px;font-weight:400;color:var(--text3);}

/* CONCLUDED */
.cc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.cc-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.cc-hdr{padding:11px 13px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;gap:9px;}
.cc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.cc-name{font-size:13px;font-weight:600;color:var(--text);}
.cc-sub{font-size:10px;color:var(--text3);}
.cc-badges{display:flex;gap:5px;margin-left:auto;}
.cc-b{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;}
.cc-b.ag{background:var(--teal-bg);color:var(--teal);}
.cc-b.ab{background:#ede0f8;color:#5a2d8c;}
.cc-b.ok{background:var(--blue-bg);color:var(--blue);}
.cc-row{display:flex;align-items:center;gap:7px;padding:7px 13px;border-bottom:1px solid #f7f5f1;}
.cc-row:last-child{border-bottom:none;}
.cc-loja{flex:1;font-size:11px;font-weight:500;color:var(--text);}
.cc-num{font-size:10px;color:var(--text3);}
.pill-hoje{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--teal-bg);color:var(--teal);white-space:nowrap;}
.pill-agendado{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--blue-bg);color:var(--blue);white-space:nowrap;}
.pill-aberto{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:#ede0f8;color:#5a2d8c;white-space:nowrap;}
.pill-ativo{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--teal-bg);color:var(--teal);white-space:nowrap;}
.conc-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 0;border-top:1px solid var(--border);margin-top:1.5rem;user-select:none;}
.conc-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.conc-cnt{font-size:10px;background:var(--blue-bg);color:var(--blue);padding:1px 7px;border-radius:20px;font-weight:600;}
.conc-arrow{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;}
.conc-toggle.open .conc-arrow{transform:rotate(180deg);}
.conc-body{display:none;}
.conc-body.open{display:block;}
.conc-table tbody tr:nth-child(odd){background:#f7f6f3;}
.conc-table tbody tr:nth-child(even){background:#f1efeb;}
.conc-table td{color:var(--text3);}
.conc-table td.lc{color:var(--text2);}

/* DB */
.db-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.db-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
.db-stat .lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.db-stat .val{font-size:24px;font-weight:700;}
.rede-rj{display:inline-flex;font-size:10px;font-weight:700;padding:2px 8px;background:linear-gradient(135deg,rgba(180,20,20,1) 30%,rgba(25,35,110,1) 70%);color:#fff;}
.rede-ml{display:inline-flex;font-size:10px;font-weight:700;padding:2px 8px;background:#0055be;color:#fff;}
.rede-mega{display:inline-flex;font-size:10px;font-weight:700;padding:2px 8px;background:#0a5c47;color:#fff;}
.status-db{display:inline-flex;font-size:10px;font-weight:700;padding:2px 8px;}
.status-db.antigo{background:#f0ede8;color:#6b6960;}
.status-db.transicao{background:var(--indigo-bg);color:var(--indigo);}
.status-db.ativo{background:var(--teal-bg);color:var(--teal);}
.rede-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden;}
.rede-opt{font-family:var(--font);font-size:12px;font-weight:500;padding:6px 12px;border:none;background:transparent;cursor:pointer;color:var(--text2);}
.rede-opt.on{background:var(--teal-mid);color:#fff;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;width:620px;max-width:96vw;max-height:92vh;overflow-y:auto;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.15);}
.mhdr{padding:16px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mhdr h2{font-size:14px;font-weight:700;}
.xbtn{font-size:20px;cursor:pointer;color:var(--text3);border:none;background:none;line-height:1;padding:0 5px;border-radius:4px;}
.xbtn:hover{background:var(--surface2);}
.mbody{padding:18px 20px;}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.fg input,.fg select{font-family:var(--font);font-size:12px;padding:7px 9px;border:1px solid var(--border2);background:#fff;color:var(--text);border-radius:6px;outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--teal-mid);}
.fg textarea{font-family:var(--font);font-size:12px;padding:8px 10px;border:1px solid var(--border2);background:#fff;color:var(--text);border-radius:6px;outline:none;resize:vertical;min-height:80px;line-height:1.55;}
.fg textarea:focus{border-color:var(--teal-mid);}
/* log */
.log-sec{border:1px solid var(--border);min-height:120px;max-height:220px;overflow-y:auto;padding:4px 10px;margin-top:5px;background:var(--surface2);border-radius:6px;}
.log-entry{font-size:11px;line-height:1.6;padding:7px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.log-entry:last-child{border-bottom:none;}
.log-ts{font-size:10px;color:var(--text3);font-weight:600;}
.log-txt{color:var(--text2);}
.log-acts{display:flex;gap:5px;margin-top:2px;}
.lbtn{font-family:var(--font);font-size:10px;padding:2px 7px;border:1px solid var(--border2);background:transparent;color:var(--text3);border-radius:4px;cursor:pointer;}
.lbtn:hover{background:var(--surface2);color:var(--text);}
.lbtn.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bg);}
.log-edit-area{font-family:var(--font);font-size:11px;padding:5px 8px;border:1px solid var(--teal-mid);background:#fff;color:var(--text);resize:vertical;min-height:46px;width:100%;border-radius:4px;outline:none;}
.add-note{display:flex;gap:6px;margin-top:7px;}
.add-note textarea{flex:1;font-family:var(--font);font-size:12px;padding:6px 8px;border:1px solid var(--border2);background:#fff;color:var(--text);border-radius:6px;resize:none;min-height:46px;outline:none;}
.add-note textarea:focus{border-color:var(--teal-mid);}
.btn-note{font-family:var(--font);font-size:11px;font-weight:600;padding:6px 11px;border:1px solid var(--teal-mid);background:var(--teal-bg);color:var(--teal);border-radius:6px;cursor:pointer;align-self:flex-end;white-space:nowrap;}
.btn-note:hover{background:var(--teal-mid);color:#fff;}
/* flow */
.flow-sec{margin-bottom:16px;}
.flow-sec-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.flow-steps{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.fstep{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border);}
.fstep:last-child{border-bottom:none;}
.fstep.done{background:#f0faf5;}
.fstep.locked{background:var(--surface2);opacity:.55;}
.fstep.next{background:#f5f7ff;}
.fstep-chk{margin-top:1px;flex-shrink:0;}
.fstep-chk input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--teal-mid);}
.fstep-chk input:disabled{cursor:not-allowed;}
.fstep-info{flex:1;}
.fstep-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.step-num{font-size:9px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:1px 5px;border-radius:3px;}
.lock-msg{font-size:10px;font-weight:400;color:var(--text3);font-style:italic;}
.fstep-date input{font-family:var(--font);font-size:11px;padding:4px 8px;border:1px solid var(--border2);background:#fff;color:var(--text);border-radius:5px;outline:none;width:180px;}
.fstep-date input:focus{border-color:var(--teal-mid);}
.fstep-date input:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}
/* footer */
.mfooter{padding:10px 20px 16px;display:flex;gap:7px;justify-content:flex-end;border-top:1px solid var(--border);}
.btn-save{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 20px;border:none;border-radius:6px;background:var(--teal-mid);color:#fff;cursor:pointer;}
.btn-save:hover{background:var(--teal);}
.btn-cancel{font-family:var(--font);font-size:12px;padding:7px 14px;border:1px solid var(--border2);background:#fff;color:var(--text2);border-radius:6px;cursor:pointer;}
.btn-del{font-family:var(--font);font-size:12px;padding:7px 14px;border:1px solid var(--red-bg);background:var(--red-bg);color:var(--red);border-radius:6px;cursor:pointer;margin-right:auto;}
.del-confirm{display:flex;gap:6px;align-items:center;margin-top:4px;}
.no-results{padding:3rem;text-align:center;color:var(--text3);}

@media(max-width:800px){
  .stats-row,.db-stats{grid-template-columns:repeat(2,1fr);}
  .spot-row,.kanban,.fase-grid{grid-template-columns:1fr;}
  .content{padding:12px;}
}

/* READ ONLY / ADMIN */
body.viewer .edit-only{display:none!important;}
body.admin.locked .edit-only{display:none!important;}
body.viewer .kb-card, body.viewer tbody tr, body.viewer .tl-item, body.viewer .active-card{cursor:default;}
body.admin.locked .kb-card, body.admin.locked tbody tr, body.admin.locked .tl-item, body.admin.locked .active-card{cursor:default;}
.readonly-pill{font-size:10px;font-weight:700;padding:3px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface2);color:var(--text3);letter-spacing:.04em;text-transform:uppercase;}
.login-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;max-width:380px;margin:40px auto;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.login-box h2{font-size:16px;margin-bottom:6px;}
.login-box p{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:12px;}
.login-box input{width:100%;font-family:var(--font);font-size:13px;padding:9px 10px;border:1px solid var(--border2);border-radius:6px;margin-bottom:10px;}
.login-box button{font-family:var(--font);font-size:12px;font-weight:700;padding:8px 14px;border:1px solid var(--teal-mid);background:var(--teal-bg);color:var(--teal);border-radius:6px;cursor:pointer;}
.login-box button:hover{background:var(--teal-mid);color:#fff;}

/* SUPPORT */
.support-layout{display:grid;grid-template-columns:1.35fr .65fr;gap:12px;align-items:start;}
.support-panel{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.support-panel-hdr{padding:10px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.support-panel-title{font-size:12px;font-weight:700;color:var(--text);}
.support-list{display:flex;flex-direction:column;}
.support-ticket{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);cursor:pointer;}
.support-ticket:last-child{border-bottom:none;}
.support-ticket:hover{background:#eef9f4;}
.support-id{font-size:12px;font-weight:700;color:var(--text);}
.support-main{min-width:0;}
.support-store{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.support-sub{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.support-meta{display:flex;align-items:center;gap:5px;justify-content:flex-end;flex-wrap:wrap;}
.support-history{padding:9px 13px;border-bottom:1px solid #f7f5f1;}
.support-history:last-child{border-bottom:none;}
.support-history .dt{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:3px;}
.support-history .txt{font-size:11px;color:var(--text2);line-height:1.35;}
.support-empty{padding:13px;font-size:11px;color:var(--text3);font-style:italic;}
.ticket-status{display:inline-flex;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.ticket-status.aberto{background:#fce4e4;color:#8b1a1a;}
.ticket-status.andamento{background:var(--indigo-bg);color:var(--indigo);}
.ticket-status.fechado{background:var(--blue-bg);color:var(--blue);}
.ticket-origin{display:inline-flex;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#f0ede8;color:var(--text2);text-transform:uppercase;}
.ticket-origin.email{background:#e0e4f8;color:#2d3a8c;}
.ticket-origin.manual{background:#e6f8ef;color:#0a5c47;}
.ticket-origin.zoho{background:#fff3d8;color:#7a4b00;}
@media(max-width:900px){.support-layout{grid-template-columns:1fr;}.support-ticket{grid-template-columns:78px 1fr;}.support-meta{grid-column:1/-1;justify-content:flex-start;}}

/* ACTIVE PRESENCE */
.active-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px;}
.active-card{position:relative;min-height:174px;background:linear-gradient(180deg,#fff 0,#fbfcfd 100%);border:1px solid var(--border);border-radius:12px;padding:20px 16px 14px;cursor:pointer;overflow:hidden;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;}
.active-card:before{content:"";position:absolute;left:0;right:0;top:0;height:7px;background:#d8e0e7;box-shadow:0 1px 0 rgba(255,255,255,.65) inset;}
.active-card:hover{transform:translateY(-2px);}
.active-card.ok{border-color:#98dec0;box-shadow:0 0 0 1px rgba(15,139,99,.10),0 0 20px rgba(15,139,99,.18),0 12px 30px rgba(21,23,26,.06);}
.active-card.yellow{border-color:#edd06b;box-shadow:0 0 0 1px rgba(201,154,20,.13),0 0 20px rgba(201,154,20,.22),0 12px 30px rgba(21,23,26,.06);}
.active-card.orange{border-color:#ec9b43;box-shadow:0 0 0 1px rgba(207,103,21,.16),0 0 22px rgba(207,103,21,.26),0 12px 30px rgba(21,23,26,.06);}
.active-card.red{border-color:#e47777;box-shadow:0 0 0 1px rgba(157,28,28,.16),0 0 24px rgba(157,28,28,.30),0 12px 30px rgba(21,23,26,.07);}
.active-card.blue{border-color:#90c8f3;box-shadow:0 0 0 1px rgba(21,85,154,.12),0 0 20px rgba(21,85,154,.20),0 12px 30px rgba(21,23,26,.06);}
.active-card.ok:before{background:linear-gradient(90deg,#10a66f,#87dfb6);}
.active-card.yellow:before{background:linear-gradient(90deg,#d69d00,#f2d76b);}
.active-card.orange:before{background:linear-gradient(90deg,#c85b00,#f2a65a);}
.active-card.red:before{background:linear-gradient(90deg,#a91919,#ee8585);}
.active-card.blue:before{background:linear-gradient(90deg,#1765ad,#8dc8f3);}
.active-card.pulse{animation:activePulse 1.6s ease-in-out infinite;}
@keyframes activePulse{0%,100%{box-shadow:0 0 0 1px rgba(157,28,28,.14),0 0 16px rgba(157,28,28,.22),0 10px 26px rgba(21,23,26,.05);}50%{box-shadow:0 0 0 3px rgba(157,28,28,.18),0 0 30px rgba(157,28,28,.42),0 10px 26px rgba(21,23,26,.08);}}
.active-card-head{width:100%;display:flex;align-items:center;justify-content:center;padding-top:10px;margin-bottom:9px;}
.active-store{font-size:15px;font-weight:850;color:var(--text);line-height:1.18;max-width:220px;}
.active-store small{display:flex;justify-content:center;align-items:center;gap:6px;font-size:10px;font-weight:700;color:var(--text3);margin-top:7px;}
.active-meta{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:12px;min-height:20px;}
.active-obs{display:inline-block;list-style:none;margin:2px auto 0;padding:0;min-height:28px;max-width:212px;text-align:left;font-size:10px;color:var(--text2);line-height:1.4;}
.active-obs li{position:relative;padding-left:11px;margin:2px 0;}
.active-obs li:before{content:"\2022";position:absolute;left:1px;color:#bfc6cd;}
.active-obs li.active-obs-more{color:var(--text3);font-weight:750;font-size:9px;}
.active-obs li.active-obs-more:before{content:"";}
.active-age{position:absolute;right:12px;bottom:10px;font-size:10px;font-weight:850;color:var(--text3);background:#eef2f5;border:1px solid #dbe2e8;border-radius:999px;padding:2px 7px;}
.active-card .store-num-pill.after{margin-left:0;background:#f3f6f8;color:#5b6570;}
.active-card .tag-rj,.active-card .tag-ml,.active-card .tag-mega{font-size:10px;padding:3px 8px;box-shadow:0 1px 2px rgba(21,23,26,.05);}
.active-card .tag-resp{background:#eef0ff;color:#34439a;padding:3px 8px;font-weight:750;}
.active-card .tag-db{padding:3px 8px;font-weight:750;}
.active-tk{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:750;padding:3px 8px;border-radius:999px;background:#eef2f5;color:#5b6570;border:1px solid #dbe2e8;box-shadow:0 1px 2px rgba(21,23,26,.05);}
.active-tk.has-open{background:#fde5e5;color:#9d1c1c;border-color:#f2bcbc;}
.active-tk i{font-size:9px;}
.active-tickets-sec{margin-top:2px;}
.atk-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:7px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:6px;cursor:pointer;background:var(--surface2);}
.atk-row:last-child{margin-bottom:0;}
.atk-row:hover{border-color:var(--teal-mid);}
.atk-id{font-size:11px;font-weight:700;color:var(--text);}
.atk-main{min-width:0;}
.atk-assunto{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.atk-sub{font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.atk-empty{font-size:11px;color:var(--text3);font-style:italic;padding:4px 0;}
.active-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
@media(max-width:800px){.active-summary{grid-template-columns:repeat(2,1fr);}.active-grid{grid-template-columns:1fr;}}
/* HERO RESUMO ATIVO */
.active-hero{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 26px;margin-bottom:16px;}
.active-hero .hero-main{display:flex;flex-direction:column;justify-content:center;padding-right:24px;border-right:1px solid var(--border);}
.active-hero .hero-num{font-size:56px;font-weight:850;line-height:.9;color:var(--text);letter-spacing:-.02em;}
.active-hero .hero-cap{font-size:13px;font-weight:600;color:var(--text2);margin-top:7px;max-width:150px;}
.hero-break{display:flex;flex-direction:column;gap:11px;min-width:0;}
.hero-stats{display:flex;gap:10px;flex-wrap:wrap;}
.hero-stat{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:7px 15px 7px 9px;}
.hero-stat b{font-size:19px;font-weight:850;color:var(--text);}
.hero-stat .hicon{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-size:12px;font-weight:900;color:#fff;line-height:1;}
.hero-stat.ok .hicon{background:#10a66f;}
.hero-stat.att .hicon{background:#d99b00;}
.hero-stat.prob .hicon{background:#cf3030;}
.hero-bar{display:flex;height:10px;border-radius:999px;overflow:hidden;background:#eef2f5;border:1px solid var(--border);}
.hero-bar span{display:block;height:100%;}
.hero-bar .s-ok{background:#10a66f;}.hero-bar .s-att{background:#e8b324;}.hero-bar .s-prob{background:#cf3030;}
@media(max-width:640px){.active-hero{grid-template-columns:1fr;}.active-hero .hero-main{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:14px;}}
/* SELO DE STATUS NO CARD */
.active-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.01em;padding:4px 11px 4px 8px;border-radius:999px;margin-bottom:2px;}
.active-badge .bdot{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:10px;font-weight:900;color:#fff;line-height:1;}
.active-badge.ok{background:#e3f6ed;color:#0b7a52;}
.active-badge.ok .bdot{background:#10a66f;}
.active-badge.att{background:#fcf2d6;color:#946b00;}
.active-badge.att .bdot{background:#d99b00;}
.active-badge.prob{background:#fbe1e1;color:#9d1c1c;}
.active-badge.prob .bdot{background:#cf3030;}
.active-subline{font-size:10px;font-weight:750;color:var(--text3);margin-top:5px;}
.active-card.att{border-color:#edd06b;box-shadow:0 0 0 1px rgba(201,154,20,.13),0 0 20px rgba(201,154,20,.20),0 12px 30px rgba(21,23,26,.06);}
.active-card.prob{border-color:#e47777;box-shadow:0 0 0 1px rgba(157,28,28,.16),0 0 24px rgba(157,28,28,.28),0 12px 30px rgba(21,23,26,.07);}
.active-card.att:before{background:linear-gradient(90deg,#d69d00,#f2d76b);}
.active-card.prob:before{background:linear-gradient(90deg,#a91919,#ee8585);}

/* VISUAL REFRESH */
:root{
  --bg:#eef1f4;--surface:#ffffff;--surface2:#f6f8fa;--border:#dde3e8;--border2:#b8c2cc;
  --text:#15171a;--text2:#4d5761;--text3:#7d8790;
  --teal:#065f46;--teal-bg:#def7ec;--teal-mid:#0f8b63;
  --indigo:#33439b;--indigo-bg:#e7eafd;
  --red:#9d1c1c;--red-bg:#fde5e5;
  --blue:#15559a;--blue-bg:#e0efff;
}
body{background:linear-gradient(180deg,#f7f8fa 0,#eef1f4 220px,#eef1f4 100%);color:var(--text);}
.topbar{height:56px;background:rgba(255,255,255,.94);backdrop-filter:saturate(145%) blur(10px);box-shadow:0 1px 0 rgba(21,23,26,.06);border-bottom:1px solid rgba(221,227,232,.85);}
.brand-pill{border-radius:999px;background:#fff;border-color:#d7dee5;box-shadow:0 1px 2px rgba(21,23,26,.04);}
.sys-title{font-size:14px;font-weight:800;}
.sys-sub{color:var(--text3);}
.page-nav{top:56px;background:rgba(255,255,255,.88);backdrop-filter:saturate(145%) blur(10px);box-shadow:0 1px 0 rgba(21,23,26,.05);}
.pnav-btn{padding:12px 15px;border-radius:0;color:#6a747d;}
.pnav-btn.on{color:var(--teal);border-bottom-color:var(--teal-mid);}
.content{max-width:1420px;padding-top:24px;}
.home-intro,.stat,.spot-card,.action-card,.table-wrap,.dash-section,.kb-col,.fase-card,.cc-card,.db-stat,.support-panel,.login-box{border-radius:8px;border-color:#dbe2e8;box-shadow:0 10px 28px rgba(21,23,26,.045);}
.home-intro{padding:18px 20px;background:linear-gradient(135deg,#fff 0,#f7fbfa 64%,#eef8f4 100%);}
.home-kicker{color:var(--teal);font-weight:800;}
.home-title{font-size:25px;letter-spacing:0;}
.home-sub{color:var(--text2);}
.focus-pill,.qtab,.store-num-pill{box-shadow:0 1px 0 rgba(21,23,26,.03);}
.stats-row,.db-stats{gap:12px;}
.stat,.db-stat{padding:16px 17px;background:#fff;}
.stat .lbl,.db-stat .lbl{color:#737e87;}
.stat .val,.db-stat .val{font-size:30px;letter-spacing:0;}
.spot-hdr,.action-hdr,.dash-sec-hdr,.fase-hdr,.support-panel-hdr{background:#f7f9fb;}
.spot-item,.action-item,.dash-row,.support-ticket{transition:background .14s ease,box-shadow .14s ease;}
.spot-item:hover,.action-item:hover,.dash-row:hover,.support-ticket:hover{background:#f1faf6!important;}
.toolbar{background:#fff;border:1px solid #dbe2e8;border-radius:8px;padding:10px 12px;box-shadow:0 8px 22px rgba(21,23,26,.04);}
.view-tabs{background:#eef2f5;border-color:#dbe2e8;border-radius:8px;}
.vtab{padding:7px 12px;border-radius:6px;}
.vtab.on{background:#fff;color:#121416;box-shadow:0 1px 3px rgba(21,23,26,.08);}
.qtab{background:#f7f9fb;border-color:#dbe2e8;color:#4d5761;}
.qtab.on{background:#101828;border-color:#101828;color:#fff;}
input.tb,select.tb{border-color:#cbd5df;background:#fff;min-height:31px;}
input.tb:focus,select.tb:focus{box-shadow:0 0 0 3px rgba(15,139,99,.12);}
.btn-sm,.btn-add,.btn-save-all,.btn-cancel,.btn-save,.btn-del,.btn-note,.lbtn{border-radius:7px;}
.btn-add,.btn-save-all{box-shadow:0 1px 2px rgba(6,95,70,.08);}
.table-wrap{overflow:auto;}
table{background:#fff;}

const SUPABASE_URL = "https://ldkthfsczvqmotauqyis.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OtUjDdX6GbNjFFY7XyGLoQ_sOCikmgr";
const SUPABASE_TABLE = "presence_control_state";
const SUPABASE_STATE_KEY = "main";
const APP_MODE = "viewer"; // viewer | admin
const ADMIN_PASSWORD = "douglas2026"; // troque se quiser
const ADMIN_RPC_TOKEN = "pc_edit_token_douglas_2026_4c2a9b8f"; // precisa ser igual ao token do SQL
let adminUnlocked = APP_MODE === "admin" && sessionStorage.getItem("pc_admin_unlocked") === "1";
function canEdit(){ return APP_MODE === "admin" && adminUnlocked; }
function applyModeUi(){
  document.body.classList.toggle("viewer", APP_MODE === "viewer");
  document.body.classList.toggle("admin", APP_MODE === "admin");
  document.body.classList.toggle("locked", APP_MODE === "admin" && !adminUnlocked);
  const p=document.getElementById("mode-pill");
  if(p) p.textContent = APP_MODE === "viewer" ? "Somente leitura" : (adminUnlocked ? "Admin" : "Admin bloqueado");
}
let supabaseClient = null;
let supabaseEnabled = false;
let isBooting = true;
function hasSupabaseConfig(){
  return SUPABASE_URL.startsWith("https://") && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith("COLE_AQUI");
}
function initSupabase(){
  if(!hasSupabaseConfig() || !window.supabase) return false;
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  supabaseEnabled = true;
  return true;
}
function statePayload(){
  return {version:1, updatedAt:new Date().toISOString(), golive:lojas, lojas:dbExtra, suporte:supportTickets, presenceAtivo:activeHealth};
}
async function loadFromSupabase(){
  if(!supabaseEnabled) return false;
  const {data,error}=await supabaseClient
    .from(SUPABASE_TABLE)
    .select("key,payload,updated_at")
    .eq("key",SUPABASE_STATE_KEY)
    .maybeSingle();

  if(error){
    console.error("Supabase load error:", error);
    showToast("Não consegui carregar do Supabase. Usando dados locais.",true);
    return false;
  }

  if(data && data.payload){
    lojas = data.payload.golive || [];
    dbExtra = data.payload.lojas || [];
    supportTickets = data.payload.suporte || [];
    activeHealth = data.payload.presenceAtivo || JSON.parse(JSON.stringify(EMBEDDED_ACTIVE_HEALTH));
    console.info("Dados carregados do Supabase:", data.updated_at);
    return true;
  }

  console.warn("Registro main não existe no Supabase. Criando com os dados embutidos do HTML...");
  return await seedSupabaseInitialState();
}
async function seedSupabaseInitialState(){
  if(!supabaseEnabled) return false;
  const {error}=await supabaseClient
    .from(SUPABASE_TABLE)
    .insert({key:SUPABASE_STATE_KEY,payload:statePayload(),updated_at:new Date().toISOString()});
  if(error){
    console.error("Supabase seed error:", error);
    showToast("Tabela criada, mas não consegui criar o registro inicial no Supabase.",true);
    return false;
  }
  console.info("Registro inicial criado no Supabase.");
  return true;
}
async function saveToSupabase(silent=false){
  if(isBooting) return;
  if(!canEdit()){ if(!silent) showToast("Modo somente leitura. Alterações não foram salvas.", true); return; }
  saveLocal(); saveDbLocal(); saveSupportLocal(); saveActiveLocal();
  if(!supabaseEnabled){ if(!silent) showToast("Salvo localmente. Configure o Supabase para salvar online."); return; }
  const {error}=await supabaseClient.rpc("save_presence_control_state",{
    p_token: ADMIN_RPC_TOKEN,
    p_payload: statePayload()
  });
  if(error){console.error("Supabase save error:", error); if(!silent) showToast("Erro ao salvar no Supabase. Backup local mantido.",true);}
  else if(!silent) showToast("Salvo no Supabase.");
}
async function initApp(){
  applyModeUi();
  load(); loadDb(); loadSupport(); loadActive(); initSupabase();
  if(supabaseEnabled) await loadFromSupabase();
  isBooting=false;
  setPage("active");
  if(APP_MODE === "admin" && !adminUnlocked) renderAdminLogin();
  applyModeUi();
}

    try {

      if(d.golive&&d.lojas){lojas=d.golive;dbExtra=d.lojas;supportTickets=d.suporte||[];activeHealth=d.presenceAtivo||JSON.parse(JSON.stringify(EMBEDDED_ACTIVE_HEALTH));await saveToSupabase(true);renderPage();showToast(lojas.length+' go-lives, '+dbExtra.length+' lojas, '+supportTickets.length+' chamados e '+activeHealth.length+' ativos carregados e salvos.');}

      else throw 0;
    } catch{showToast('Arquivo inválido.',true);}

  };

}

}

function parseDate(s){
  if(!s) return null;
  const p=s.trim().split(' ')[0].split('/');
  if(p.length<3) return null;
  return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
}
function fmtDate(s){
  if(!s||s==='1') return null;
  const d=parseDate(s); if(!d) return s;
  const day=String(d.getDate()).padStart(2,'0');
  const mon=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][d.getMonth()];
  const t=s.includes(' ')?' '+s.trim().split(' ')[1]:'';
  return `${day}/${mon}${t}`;
}
function daysDiff(s){if(!s||s==='1')return null;const d=parseDate(s);if(!d)return null;return Math.round((d-TODAY)/86400000);}
function prevBusinessDay(d){const r=new Date(d);r.setDate(r.getDate()-1);while(r.getDay()===0||r.getDay()===6)r.setDate(r.getDate()-1);return r;}
function fmtDateObj(d){const day=String(d.getDate()).padStart(2,'0');const mon=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][d.getMonth()];return `${day}/${mon}`;}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function isOverdue(l){return l.status!=='concluido'&&l.goLive&&daysDiff(l.goLive)<0;}
function stepsDone(l){
  let done=[];
  for(let i=0;i<FASES.length;i++){
    const prev=i===0||done[i-1];
    done.push(prev&&!!l[FASES[i].key]);
  }
  return done;
}
function countDone(l){return stepsDone(l).filter(Boolean).length;}
function badgeHtml(s){const m={aberto:'Aguardando',agendado:'Cronograma',concluido:'Presence Ativo'};return `<span class="badge ${s}">${m[s]||s}</span>`;}
function lojaNumPill(l,pos='before'){return l&&l.num?`<span class="store-num-pill ${pos}">${esc(l.num)}</span>`:'';}
function redeTagHtml(l){
  const r=redeFromGrupo(l.grupo,l.rede);
  if(r==='both') return '<span class="tag-mega">MEGA</span>';
  return r==='ml'?'<span class="tag-ml">ML</span>':'<span class="tag-rj">RJ</span>';
}
function nextStepInfo(l){
  if(l.status==='concluido') return {key:'ok',label:'Presence ativo',rank:80};
  const done=stepsDone(l);
  const firstMissing=done.findIndex(v=>!v);
  if(firstMissing>=0&&firstMissing<FASES.length-1){
    return {key:'pending',label:FASES[firstMissing].label+' pendente',rank:20+firstMissing};
  }
  if(isOverdue(l)) return {key:'risk',label:'Go-live atrasado',rank:5};
  if(l.goLive){
    const d=daysDiff(l.goLive);
    if(d===0) return {key:'soon',label:'Go-live hoje',rank:60};
    if(d!==null&&d<=7) return {key:'soon',label:'Go-live próximo',rank:61};
    return {key:'scheduled',label:'Go-live agendado',rank:62};
  }
  return {key:'pending',label:'Agendar go-live',rank:40};
}
function nextStepHtml(l){const n=nextStepInfo(l);return `<span class="step-pill ${n.key}">${n.label}</span>`;}
function redeLabel(r){
  if(r==='both') return '<span class="rede-mega">Mega</span>';
  return r==='ml'?'<span class="rede-ml">Minha Lavanderia</span>':'<span class="rede-rj">Restaura Jeans</span>';
}
function statusDbLabel(s){const m={antigo:'Sistema Antigo / Contrato Pendente',transicao:'Contrato assinado',ativo:'Presence Ativo'};return `<span class="status-db ${s}">${m[s]||s}</span>`;}
function ufFromName(nome){const m=(nome||'').trim().match(/^([A-Z]{2})\s+/);return m?m[1]:'';}
function cidadeFromName(nome){return (nome||'').replace(/^[A-Z]{2}\s+/, '').trim();}
function redeFromGrupo(grupo,rede){if(rede)return rede;const g=(grupo||'').toLowerCase();if(g.includes('minha lavanderia'))return 'ml';if(g.includes('mega'))return 'both';return 'rj';}
function isMegaStore(l){return (l.rede==='both') || (l.grupo||'').toLowerCase().includes('mega');}
function hasPresenceNumber(l){return !!(l.num||'').trim();}
function inNextDays(dateStr,days){const d=daysDiff(dateStr);return d!==null&&d>=0&&d<=days;}
function getDatabase(){
  const fromGL=lojas.map(l=>({
    _glIdx:lojas.indexOf(l),nome:l.loja,num:l.num,
    rede:l.grupo&&l.grupo.toLowerCase().includes('minha lavanderia')?'ml':'rj',
    status:l.status==='concluido'?'ativo':'transicao',
    alerta:!!l.alerta,responsavel:l.responsavel||'',obs:'',_fromGL:true
  }));
  const extras=dbExtra.map((l,i)=>({...l,_extraIdx:i,_fromGL:false}));
  return [...fromGL,...extras].sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
}

function activeKey(l){return ((l.num||'')+'|'+(l.loja||'')).toLowerCase();}
function activeStoreKey(l){return ((l.loja||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim()+'|'+(l.rede||'')).toLowerCase();}
function normLojaName(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim();}
function ticketsForStore(loja,num){
  const ln=normLojaName(loja),n=(num||'').trim();
  return supportTickets.filter(t=>{
    if(n&&(t.numLoja||'').trim()===n)return true;
    if(t.loja&&normLojaName(t.loja)===ln)return true;
    return false;
  });
}
function ticketSummary(loja,num){
  const list=ticketsForStore(loja,num);
  const abertos=list.filter(t=>t.status==='aberto'||t.status==='andamento').length;
  return {total:list.length,abertos,list};
}

      ${supportStatusLabel(t.status)}
    </div>`;
  }).join('');
}
function activeAgeDays(since){
  const d=parseDate(since||'');
  if(!d)return null;
  d.setHours(0,0,0,0);
  return Math.max(1,Math.floor((TODAY-d)/86400000)+1);
}
function activeUpdatedAgeDays(updatedAt){
  const d=parseDate(updatedAt||'');
  if(!d)return null;
  d.setHours(0,0,0,0);
  return Math.max(0,Math.floor((TODAY-d)/86400000));
}
function activeStatusInfo(l){
  const age=l.status==='pending'||l.status==='down'?activeAgeDays(l.since):null;
  const staleAge=l.status==='ok'?activeUpdatedAgeDays(l.updatedAt):null;
  if(l.status==='down') return {cls:'red pulse',label:'Alerta',icon:'!',age};
  if(l.status==='pending'){
    if(age!==null&&age>=3) return {cls:'red pulse',label:'Pendente',icon:'!',age};
    if(age!==null&&age>=2) return {cls:'orange',label:'Pendente',icon:'!',age};
    return {cls:'yellow',label:'Pendente',icon:'!',age};
  }
  if(staleAge!==null&&staleAge>7) return {cls:'blue',label:'Contato preventivo',icon:'',age:staleAge,stale:true};
  return {cls:'ok',label:'Tudo ok',icon:'',age:null};
}
function activeSimpleState(l){
  const info=activeStatusInfo(l);
  if(info.cls.includes('red')) return {key:'prob',label:'Com problema',icon:'!'};
  if(info.cls==='orange'||info.cls==='yellow') return {key:'att',label:'Precisa de atenção',icon:'•'};
  return {key:'ok',label:'Funcionando',icon:'✓'};
}
function isHQActive(l){return (l.num||'').toString().trim()===HQ_STORE.num;}
function getActiveRecords(){
  const map=new Map();
  const manualStoreKeys=new Set();
  activeHealth.forEach((l,i)=>{
    const rec={...l,updatedAt:l.updatedAt||ACTIVE_DEFAULT_UPDATED,_idx:i,_source:'manual'};
    map.set(activeKey(rec),rec);
    manualStoreKeys.add(activeStoreKey(rec));
  });
  getDatabase().filter(l=>l.status==='ativo').forEach(l=>{
    const rec={loja:l.nome,num:l.num||'',rede:l.rede,status:'ok',since:'',responsavel:l.responsavel||'',obs:l.obs||'Funcionando',updatedAt:l.updatedAt||ACTIVE_DEFAULT_UPDATED,_source:'auto'};
    if(manualStoreKeys.has(activeStoreKey(rec)))return;
    const key=activeKey(rec);
    if(!map.has(key))map.set(key,rec);
  });
  return [...map.values()].sort((a,b)=>{
    const sa=activeStatusInfo(a),sb=activeStatusInfo(b);
    const rank=s=>s.cls.includes('red')?0:s.cls==='orange'?1:s.cls==='yellow'?2:s.cls==='blue'?4:3;
    const r=rank(sa)-rank(sb);
    return r||a.loja.localeCompare(b.loja,'pt');
  });
}

    const info=activeStatusInfo(l);
    const st=activeSimpleState(l);
    const idx=l._idx??-1;
    const obs=(l.obs||'').trim();
    const obsLines=obs.split(/\r?\n/).map(s=>s.replace(/^[•\-\s]+/,'').trim()).filter(Boolean);

    return `<div class="active-card ${st.key}${pulse}" onclick="openActiveModal(${idx},'${esc(activeKey(l))}')">

      ${showObs?`<ul class="active-obs" title="${esc(obs)}">${obsLines.slice(0,3).map(li=>`<li>${esc(li)}</li>`).join('')}${obsLines.length>3?`<li class="active-obs-more">+${obsLines.length-3} mais</li>`:''}</ul>`:''}

  });
  let hqHtml='';

    hqHtml=`<div class="active-group-hdr" style="display:flex;align-items:center;gap:8px;margin:30px 0 4px;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#5b6470;border-left:4px solid #8a93a0;padding-left:10px;">&#127970; Retaguarda (interna)<span style="font-weight:700;color:#9aa1ab;">${hqList.length}</span></div><div style="font-size:11px;color:#9aa1ab;margin:0 0 10px 14px;">Estrutura interna &mdash; n&atilde;o conta como loja usando a Presence.</div><div class="active-grid">${hqList.map(cardHtml).join('')}</div>`;

}

let glView='lista',sortCol='goLive',sortAsc=true,glQuick='all';
function getFiltered(){
  const q=(document.getElementById('gl-q')||{value:''}).value.toLowerCase();
  const st=(document.getElementById('gl-st')||{value:''}).value;
  const resp=(document.getElementById('gl-resp')||{value:''}).value;
  const uf=(document.getElementById('gl-uf')||{value:''}).value;
  const rede=(document.getElementById('gl-rede')||{value:''}).value;
  const prazo=(document.getElementById('gl-prazo')||{value:''}).value;
  const numero=(document.getElementById('gl-numero')||{value:''}).value;
  return getViewLojas().filter(l=>{
    const txt=((l.loja||'')+' '+(l.grupo||'')+' '+(l.franqueado||'')+' '+(l.num||'')+' '+(l.tickets||'')).toLowerCase();
    if(q&&!txt.includes(q)) return false;
    if(st&&l.status!==st) return false;
    if(resp&&l.responsavel!==resp) return false;
    if(uf&&ufFromName(l.loja)!==uf) return false;
    if(rede&&redeFromGrupo(l.grupo)!==rede) return false;
    if(numero==='com'&&!hasPresenceNumber(l)) return false;
    if(numero==='sem'&&hasPresenceNumber(l)) return false;
    if(prazo&& !inNextDays(l.goLive,parseInt(prazo))) return false;
    if(glQuick==='criticos'&&!isOverdue(l)) return false;
    if(glQuick==='prox7'&&!(l.status!=='concluido'&&inNextDays(l.goLive,7))) return false;
    if(glQuick==='semdata'&&!(l.status!=='concluido'&&!l.goLive)) return false;
    if(glQuick==='ativos'&&l.status!=='concluido') return false;
    return true;
  }).sort((a,b)=>{
    const da=parseDate(a.goLive),db=parseDate(b.goLive);
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
    return da-db;
  });
}

function setGLView(v){glView=v;renderGL();}
function setGLQuick(v){glQuick=v;renderGL();}

function renderGLContent(){
  const list=getFiltered();
  const st=(document.getElementById('gl-st')||{value:''}).value;
  const active=list.filter(l=>l.status!=='concluido');
  const concluded=list.filter(l=>l.status==='concluido');
  const el=document.getElementById('gl-content');
  if(!el)return;
  let html='';
  if(glView==='dash'){
    html=renderDashboard(list);
  } else if(st==='concluido'){
    html=glView==='lista'?renderLista(concluded):glView==='fase'?renderFase(concluded):renderTL(concluded);
  } else {
    if(glView==='kanban') html=renderKanban(active,concluded);
    else if(glView==='consult') html=renderConsultores(list);
    else if(glView==='lista') html=renderLista(active)+(concluded.length?renderConcluded(concluded):'');
    else if(glView==='fase') html=renderFase(active)+(concluded.length?renderConcluded(concluded):'');
    else html=renderTL(list);
  }
  el.innerHTML=html;
}

function flowDotsHtml(l){
  const done=stepsDone(l);
  return `<div class="flow-dots">${FASES.map((f,i)=>{
    const isDone=done[i],isNext=!isDone&&(i===0||done[i-1]);
    return `<div class="fd${isDone?' done':isNext?' next':''}"></div>`;
  }).join('')}</div>`;
}

function daysCell(s){
  if(!s) return '<td class="days-none">—</td>';
  const d=daysDiff(s);
  if(d===null) return '<td class="days-none">—</td>';
  if(d<0) return `<td class="days-over">atrasado ${Math.abs(d)}d</td>`;
  if(d===0) return '<td class="days-near">hoje</td>';
  if(d<=7) return `<td class="days-near">em ${d}d</td>`;
  return `<td class="days-ok">em ${d}d</td>`;
}

function renderLista(list){
  if(!list.length) return '<div class="table-wrap"><div class="no-results">Nenhuma loja encontrada.</div></div>';
  const sorted=[...list].sort((a,b)=>{
    let va=a[sortCol]||'',vb=b[sortCol]||'';
    if(sortCol==='nextStep'){
      const na=nextStepInfo(a).rank,nb=nextStepInfo(b).rank;
      return sortAsc?na-nb:nb-na;
    }
    if(sortCol==='prazo'){
      const da=daysDiff(a.goLive),db=daysDiff(b.goLive);
      const pa=da===null?9999:da,pb=db===null?9999:db;
      return sortAsc?pa-pb:pb-pa;
    }
    if(['goLive','treinLoja','treinRetag','preGoLive','instalacao'].includes(sortCol)){
      const da=parseDate(va),db=parseDate(vb);
      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
      return sortAsc?da-db:db-da;
    }
    return sortAsc?va.localeCompare(vb,'pt'):vb.localeCompare(va,'pt');
  });
  const th=(col,lbl)=>{const on=sortCol===col?' sorted':'';const arr=sortCol===col?(sortAsc?'▲':'▼'):'⇅';return `<th class="${on}" onclick="sortBy('${col}')">${lbl}<span class="sa">${arr}</span></th>`;};
  const rows=sorted.map(l=>{
    const idx=lojaIdx(l);
    const lastLog=(l.log||'').split('\n').filter(Boolean).pop()||'';
    const logTxt=lastLog.replace(/\[\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}\] /,'').substring(0,55);
    return `<tr class="${isOverdue(l)?'over':''}${l._stub?' stub-row':''}" onclick="openModal(${idx})">
      <td class="nc">${lojaNumPill(l,'')||'—'}</td>
      <td class="lc">${l.loja}<div class="sub">${l.grupo}</div></td>
      <td>${redeTagHtml(l)}</td>
      <td>${l.responsavel?`<span class="tag-resp">${l.responsavel}</span>`:'—'}</td>
      <td>${badgeHtml(l.status)}</td>
      <td>${nextStepHtml(l)}</td>
      <td class="nc">${fmtDate(l.goLive)||'—'}</td>
      ${daysCell(l.goLive)}
      <td class="oc" title="${(l.log||'').replace(/"/g,'&quot;')}">${logTxt}${logTxt.length>=55?'…':''}</td>
    </tr>`;
  }).join('');
  return `<div class="table-wrap"><table>
    <thead><tr>${th('num','Nº')}${th('loja','Loja')}<th>Rede</th><th>Consultor</th>${th('status','Status')}${th('nextStep','Próxima etapa')}${th('goLive','Go-live')}${th('prazo','Prazo')}<th>Última nota</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function sortBy(col){sortAsc=sortCol===col?!sortAsc:true;sortCol=col;renderGLContent();}

function renderFase(list){
  return `<div class="fase-grid">${FASES.map((f,fi)=>{
    const com=list.filter(l=>stepsDone(l)[fi]).sort((a,b)=>(parseDate(a[f.key])||0)-(parseDate(b[f.key])||0));
    const sem=list.filter(l=>!stepsDone(l)[fi]);
    return `<div class="fase-card"><div class="fase-hdr"><span class="ft">Etapa ${fi+1} — ${f.label}</span><span class="fc">${com.length} ok · ${sem.length} pend.</span></div>
      ${com.map(l=>`<div class="fase-row"><span class="fn">${lojaNumPill(l)}${l.loja}</span><span style="font-size:11px;color:var(--teal)">✓ ${fmtDate(l[f.key])||''}</span></div>`).join('')}
      ${sem.length?`<div class="fase-sem">Pendentes: ${sem.map(l=>l.num?`#${l.num} ${l.loja}`:l.loja).join(', ')}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderTL(list){
  const withDate=list.filter(l=>l.goLive).sort((a,b)=>parseDate(a.goLive)-parseDate(b.goLive));
  if(!withDate.length) return '<div class="no-results">Nenhum go-live agendado.</div>';
  const months={};
  withDate.forEach(l=>{const d=parseDate(l.goLive);if(!d)return;const k=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});if(!months[k])months[k]=[];months[k].push(l);});
  return Object.entries(months).map(([m,items])=>`<div class="tl-month"><div class="tl-hdr">${m}</div>${items.map(l=>{
    const idx=lojaIdx(l);
    const diff=daysDiff(l.goLive);
    return `<div class="tl-item" onclick="openModal(${idx})">
      <div class="tl-dt" style="color:${isOverdue(l)?'#c0392b':'var(--text)'}">${fmtDate(l.goLive).split(' ')[0]}</div>
      <div class="tl-name">${lojaNumPill(l)}${l.loja}<small>${l.grupo}</small></div>
      <div style="display:flex;align-items:center;gap:7px">${badgeHtml(l.status)}${l.responsavel?`<span class="tag-resp">${l.responsavel}</span>`:''}</div>
    </div>`;
  }).join('')}</div>`).join('');
}

function renderConcluded(list){
  const rows=list.map(l=>{const idx=lojaIdx(l);return `<tr onclick="openModal(${idx})"><td class="lc">${lojaNumPill(l)}${l.loja}</td><td class="nc">${l.num}</td><td>${badgeHtml(l.status)}</td><td>${l.responsavel?`<span class="tag-resp">${l.responsavel}</span>`:'—'}</td><td>${flowDotsHtml(l)}</td><td class="nc">${fmtDate(l.goLive)||'—'}</td><td class="oc">—</td></tr>`;}).join('');
  return `<div class="conc-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><span class="conc-label">Sistema Presence Ativo</span><span class="conc-cnt">${list.length}</span><span class="conc-arrow">▼</span></div><div class="conc-body"><div class="table-wrap conc-table"><table><thead><tr><th>Loja</th><th>Nº</th><th>Status</th><th>Consultor</th><th>Fluxo</th><th>Go-live</th><th>—</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function renderConsultores(list){
  const CONSULT_COLORS={'Maiara':'#4f5fc4','Glávio':'#158a61','Bruno':'#185fa5','Marcelo':'#7a5100'};
  const byConsult={};
  TEAM.forEach(t=>{byConsult[t]=[];});
  list.forEach(l=>{if(l.responsavel&&byConsult[l.responsavel])byConsult[l.responsavel].push(l);});
  function pillHtml(l){
    if(l.status==='concluido') return '<span class="pill-ativo">Presence Ativo</span>';
    if(!l.goLive) return '<span class="pill-aberto">Aguardando</span>';
    const d=daysDiff(l.goLive);
    if(d===0) return `<span class="pill-hoje">hoje ${l.goLive.includes(' ')?l.goLive.split(' ')[1]:'09h'}</span>`;
    if(d!==null&&d<0) return `<span class="pill-agendado" style="background:#fce4e4;color:#8b1a1a">atrasado ${Math.abs(d)}d</span>`;
    return `<span class="pill-agendado">${fmtDate(l.goLive)||'—'}</span>`;
  }
  function redeTag(l){
    const isML=l.grupo&&l.grupo.toLowerCase().includes('minha lavanderia');
    return isML?'<span class="tag-ml">ML</span>':'<span class="tag-rj">RJ</span>';
  }
  const cards=TEAM.filter(t=>byConsult[t].length>0).map(t=>{
    const ls=byConsult[t].sort((a,b)=>{
      const da=parseDate(a.goLive),db=parseDate(b.goLive);
      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;
    });
    const ag=ls.filter(l=>l.status==='agendado').length;
    const ab=ls.filter(l=>l.status==='aberto').length;
    const ok=ls.filter(l=>l.status==='concluido').length;
    const initials=t.substring(0,2).toUpperCase();
    const color=CONSULT_COLORS[t]||'#888';
    const badges=(ag?`<span class="cc-b ag">${ag} cron.</span>`:'')+
                 (ab?`<span class="cc-b ab">${ab} ag.</span>`:'')+
                 (ok?`<span class="cc-b ok">${ok} ativo</span>`:'');
    const rows=ls.map(l=>`<div class="cc-row">${redeTag(l)}<span class="cc-loja">${lojaNumPill(l)}${l.loja}</span>${pillHtml(l)}</div>`).join('');
    return `<div class="cc-card"><div class="cc-hdr"><div class="cc-av" style="background:${color}">${initials}</div><div><div class="cc-name">${t}</div><div class="cc-sub">${ls.length} loja${ls.length>1?'s':''}</div></div><div class="cc-badges">${badges}</div></div>${rows}</div>`;
  }).join('');
  return `<div class="cc-grid">${cards}</div>`;
}
function renderDashboard(list){
  const agendados=list.filter(l=>l.status==='agendado'&&daysDiff(l.goLive)!==null&&daysDiff(l.goLive)>=0&&daysDiff(l.goLive)<=6).sort((a,b)=>{const da=parseDate(a.goLive),db=parseDate(b.goLive);if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;});
  const aguardando=list.filter(l=>l.status==='aberto').sort((a,b)=>a.loja.localeCompare(b.loja,'pt')).slice(0,3);
  const ativos=list.filter(l=>l.status==='concluido').sort((a,b)=>{const da=parseDate(a.goLive),db=parseDate(b.goLive);if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return db-da;});
  function rtag(l){if(l.grupo&&l.grupo.toLowerCase().includes('minha lavanderia'))return '<span class="tag-ml">ML</span>';if(l.grupo&&l.grupo.toLowerCase().includes('mega'))return '<span class="tag-mega">MEGA</span>';return '<span class="tag-rj">RJ</span>';}
  function drow(l,dateHtml,metaHtml){const idx=lojaIdx(l);return `<div class="dash-row${isOverdue(l)?' dash-overdue':''}${l._stub?' stub-row':''}" onclick="openModal(${idx})"><div class="dash-date">${dateHtml}</div><div class="dash-name">${lojaNumPill(l)}${l.loja}${l._stub?'<span class="tag-db" style="margin-left:5px">Lojas</span>':''}</div><div class="dash-tags">${rtag(l)}${l.responsavel?`<span class="tag-resp">${l.responsavel}</span>`:''}</div><div class="dash-meta">${metaHtml}</div></div>`;}
  const secAg=agendados.length?agendados.map(l=>{const diff=daysDiff(l.goLive);const meta=diff===null?'':diff<0?`<span class="days-over">atrasado ${Math.abs(diff)}d</span>`:diff===0?'<span class="days-near" style="font-weight:800">HOJE</span>':diff===1?'<span class="days-near">amanhã</span>':`<span class="${diff<=7?'days-near':'days-ok'}">em ${diff}d</span>`;return drow(l,fmtDate(l.goLive)||'—',meta);}).join(''):'<div class="dash-empty">Nenhum go-live agendado.</div>';
  const secAw=aguardando.length?aguardando.map(l=>{const last=parseLogEntries(l.log||'').slice(-1)[0];const obs=last?last.text.substring(0,55):'—';return drow(l,'<span style="color:var(--text3);font-size:11px">sem data</span>',`<span style="color:var(--text3);font-size:11px">${obs}</span>`);}).join(''):'<div class="dash-empty">Nenhum franqueado aguardando.</div>';
  const secOk=ativos.length?ativos.map(l=>drow(l,`<span style="color:var(--teal-mid)">${fmtDate(l.goLive)||'—'}</span>`,'<span style="color:var(--teal-mid);font-weight:600;font-size:11px">✓ ativo</span>')).join(''):'<div class="dash-empty">Nenhuma loja com Presence ativo.</div>';
  function sec(id,title,count,rows,open){return `<div class="dash-section"><div class="dash-sec-hdr" onclick="toggleDashSec('${id}')"><span class="dash-sec-title">${title}</span><span class="dash-sec-cnt">${count}</span><span class="dash-arrow${open?' open':''}" id="arr-${id}">▼</span></div><div class="dash-body${open?' open':''}" id="sec-${id}">${rows}</div></div>`;}
  return sec('ag','⚡ Go-Live agendado',agendados.length,secAg,true)+sec('aw','📋 Contrato assinado',aguardando.length,secAw,true)+sec('ok','✅ Presence ativo',ativos.length,secOk,false);
}
window.toggleDashSec=function(id){const b=document.getElementById('sec-'+id);const a=document.getElementById('arr-'+id);if(b)b.classList.toggle('open');if(a)a.classList.toggle('open');};

function renderDbTable(){
  const q=(document.getElementById('db-q')||{value:''}).value.toLowerCase();
  const fRede=(document.getElementById('db-fr')||{value:''}).value;
  const fSt=(document.getElementById('db-fs')||{value:''}).value;
  const fResp=(document.getElementById('db-fres')||{value:''}).value;
  const fUf=(document.getElementById('db-uf')||{value:''}).value;
  const fNumero=(document.getElementById('db-numero')||{value:''}).value;
  const fAlerta=(document.getElementById('db-alerta-f')||{value:''}).value;
  const filtered=getDatabase().filter(l=>{
    const txt=((l.nome||'')+' '+(l.num||'')+' '+(l.obs||'')+' '+(l.responsavel||'')).toLowerCase();
    if(q&&!txt.includes(q))return false;
    if(fRede&&l.rede!==fRede)return false;
    if(fSt&&l.status!==fSt)return false;
    if(fResp&&l.responsavel!==fResp)return false;
    if(fUf&&ufFromName(l.nome)!==fUf)return false;
    if(fNumero==='com'&&!hasPresenceNumber(l))return false;
    if(fNumero==='sem'&&hasPresenceNumber(l))return false;
    if(fAlerta==='1'&&!l.alerta)return false;
    if(fAlerta==='0'&&l.alerta)return false;
    if(dbQuick==='ativo'&&l.status!=='ativo')return false;
    if(dbQuick==='transicao'&&l.status!=='transicao')return false;
    if(dbQuick==='antigo'&&l.status!=='antigo')return false;
    if(dbQuick==='semnum'&&hasPresenceNumber(l))return false;
    if(dbQuick==='alerta'&&!l.alerta)return false;
    return true;
  });
  const rows=filtered.map(l=>{
    const alertIcon=l.alerta?'<span style="color:#c0392b;font-size:11px"> ⚠</span>':'';
    const editBtn=l._fromGL?'<span style="font-size:10px;color:var(--teal-mid);font-weight:600">via Go-Live</span>':`<button class="lbtn" onclick="event.stopPropagation();openDbModal(${l._extraIdx})">Editar</button>`;

      <td>${statusDbLabel(l.status)}</td>

      <td class="oc">${l.obs||'—'}</td>
      <td>${editBtn}</td>
    </tr>`;
  }).join('');
  const el=document.getElementById('db-table');
  if(el) el.innerHTML=filtered.length?`<div class="table-wrap"><table><thead><tr><th>Loja</th><th>Nº</th><th>Rede</th><th>Status</th><th>Consultor</th><th>Obs.</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="table-wrap"><div class="no-results">Nenhuma loja encontrada.</div></div>';
}

function saveSupportTicket(){
  if(!canEdit()){showToast("Somente leitura.",true);return;}
  const lojaSel=document.getElementById('sup-loja');
  const opt=lojaSel.options[lojaSel.selectedIndex];
  const idx=parseInt(document.getElementById('sup-idx').value);
  const prev=idx===-1?{eventos:[]}:supportTickets[idx];
  const evento=document.getElementById('sup-evento').value.trim();
  const status=document.getElementById('sup-status').value;
  const eventos=[...(prev.eventos||[])];
  if(evento)eventos.push({data:nowStamp(),tipo:'manual',origem:'manual',texto:evento});
  if(prev.status&&prev.status!==status)eventos.push({data:nowStamp(),tipo:'status',origem:'manual',texto:`Status alterado de ${prev.status} para ${status}.`});
  const obj={id:document.getElementById('sup-id').value.trim(),loja:lojaSel.value,numLoja:opt?opt.dataset.num||'':'',status,origem:document.getElementById('sup-origem').value,assunto:document.getElementById('sup-assunto').value.trim(),abertoEm:document.getElementById('sup-aberto').value.trim(),fechadoEm:document.getElementById('sup-fechado').value.trim(),atualizadoEm:nowStamp(),responsavel:document.getElementById('sup-resp').value,descricao:document.getElementById('sup-desc').value.trim(),eventos};

const HQ_STORE={nome:'RETAGUARDA MATRIZ',num:'2209'};
function matchStoreForTicket(nome,num){
  const db=getDatabase();
  num=(num||'').toString().trim();
  const n=normLojaName(nome);
  // Chamados gerais (não de uma loja) vão para a Retaguarda Matriz (2209)
  if(num===HQ_STORE.num||/\b(RETAGUARDA|MATRIZ|GERAL)\b/.test(n)){
    const hq=db.find(s=>(s.num||'').trim()===HQ_STORE.num);
    return hq?{loja:hq.nome,num:hq.num||HQ_STORE.num}:{loja:HQ_STORE.nome,num:HQ_STORE.num};
  }
  if(num){const byNum=db.find(s=>(s.num||'').trim()===num);if(byNum)return{loja:byNum.nome,num:byNum.num||''};}
  if(!n)return{loja:'',num:''};
  const matches=db.filter(s=>{const sn=normLojaName(s.nome);return sn===n||(' '+sn+' ').includes(' '+n+' ')||sn.includes(n);});
  if(matches.length===1)return{loja:matches[0].nome,num:matches[0].num||''};
  if(matches.length>1){const withNum=matches.filter(s=>(s.num||'').trim());if(withNum.length===1)return{loja:withNum[0].nome,num:withNum[0].num};}
  return{loja:'',num:''};
}
function doImportTickets(){
  if(!canEdit()){showToast('Somente leitura.',true);return;}
  const raw=document.getElementById('imp-json').value.trim();
  if(!raw)return;
  let arr;
  try{arr=JSON.parse(raw);if(!Array.isArray(arr))arr=[arr];}
  catch(e){showToast('JSON inv\u00E1lido.',true);document.getElementById('imp-result').textContent='Erro: '+e.message;return;}
  let novos=0,atualizados=0,semLoja=0;
  arr.forEach(t=>{
    const id=(t.id||'').toString();
    const digits=id.replace(/\D/g,'');
    const data=t.data||t.atualizadoEm||t.abertoEm||nowStamp();
    const texto=t.resumo||t.descricao||t.assunto||'';
    const m=matchStoreForTicket(t.loja||t.lojaMencionada||'',t.numLoja||t.num||'');
    if(!m.loja)semLoja++;
    const evento={data,tipo:'email',origem:'zoho',texto};
    let idx=-1;
    if(digits){for(let i=0;i<supportTickets.length;i++){if((supportTickets[i].id||'').replace(/\D/g,'')===digits){idx=i;break;}}}
    if(idx>=0){
      const tk=supportTickets[idx];tk.eventos=tk.eventos||[];
      if(!tk.eventos.some(e=>e.data===evento.data&&e.texto===evento.texto))tk.eventos.push(evento);
      if(t.status)tk.status=t.status;
      tk.atualizadoEm=data;
      if(!tk.loja&&m.loja){tk.loja=m.loja;tk.numLoja=m.num;}
      atualizados++;
    }else{
      supportTickets.push({id,loja:m.loja,numLoja:m.num,status:t.status||'aberto',origem:'zoho',assunto:t.assunto||'',abertoEm:data,fechadoEm:'',atualizadoEm:data,responsavel:t.responsavel||'',descricao:t.descricao||texto,eventos:[evento]});
      novos++;
    }
  });
  saveSupport();renderSupport();
  document.getElementById('ov-import').classList.remove('open');
  showToast(novos+' novo(s), '+atualizados+' atualizado(s)'+(semLoja?', '+semLoja+' sem loja':'')+'.');
}

// ── DATE PICKER (flatpickr) ──
// Mantém o valor no mesmo formato DD/MM/AAAA HH:MM; se o CDN falhar, vira input de texto normal.
function mkPicker(el,withTime,defTime){
  if(!el||!window.flatpickr)return;
  if(el._flatpickr)el._flatpickr.destroy();
  const cfg={locale:'pt',allowInput:true,dateFormat:withTime?'d/m/Y H:i':'d/m/Y'};
  if(withTime){cfg.enableTime=true;cfg.time_24hr=true;if(defTime){const p=defTime.split(':');cfg.defaultHour=+p[0];cfg.defaultMinute=+p[1];}}
  flatpickr(el,cfg);
}
function initFlowPickers(){
  FASES.forEach((f,i)=>{
    if(f.checkOnly)return;
    const el=document.getElementById('fd-'+i);
    if(!el)return;
    // não anexa em valores-sentinela como "1" (fase concluída sem data) — só em vazio ou data
    if(el.value&&!/^\d{1,2}\/\d{1,2}\/\d{4}/.test(el.value))return;
    mkPicker(el,true,FASE_DEFAULTS[i]||'');
  });
}

// ── GL MODAL ──
let modalIdx=-1;
function buildFlowSteps(l){
  const done=stepsDone(l);let html='';
  for(let i=0;i<FASES.length;i++){
    const f=FASES[i],isDone=done[i],canEdit=i===0||done[i-1];
    const cls=isDone?'done':canEdit?'next':'locked';
    const lockMsg=!canEdit?`(aguardando: ${FASES[i-1].label})`:'';
    const curVal=l[f.key]||'';
    const ph=FASE_DEFAULTS[i]?`DD/MM/AAAA ${FASE_DEFAULTS[i]}`:'DD/MM/AAAA HH:MM';
    const dateField=f.checkOnly?`<div class="fstep-date" style="font-size:11px;color:var(--text3);font-style:italic">${isDone?'✓ Concluída':'Marque quando instalado'}</div>`:`<div class="fstep-date"><input type="text" id="fd-${i}" value="${curVal}" placeholder="${ph}" ${!canEdit?'disabled':''} oninput="onDateInput(${i})"></div>`;
    html+=`<div class="fstep ${cls}" id="fs-${i}"><div class="fstep-chk"><input type="checkbox" id="fc-${i}" ${isDone?'checked':''} ${!canEdit?'disabled':''} onchange="onStepCheck(${i})"></div><div class="fstep-info"><div class="fstep-label"><span class="step-num">${i+1}</span>${f.label}${lockMsg?`<span class="lock-msg">${lockMsg}</span>`:''}</div>${dateField}</div></div>`;
  }
  return html;
}
function onStepCheck(i){
  const f=FASES[i],chk=document.getElementById('fc-'+i);
  if(f.checkOnly||f.dateOptional){
    // no date required — toggle freely
    if(!chk.checked) cascadeLock(i+1);
    else unlockNext(i);
    refreshStepStyles();return;
  }
  // goLive: date required
  const di=document.getElementById('fd-'+i);
  if(chk.checked){
    if(!di.value.trim()){chk.checked=false;di.focus();di.style.borderColor='#c0392b';setTimeout(()=>di.style.borderColor='',1800);showToast('Insira a data antes de marcar.',true);return;}
    unlockNext(i);
  } else {di.value='';cascadeLock(i+1);}
  refreshStepStyles();
}
function onDateInput(i){
  const v=document.getElementById('fd-'+i).value.trim();
  const c=document.getElementById('fc-'+i);
  const f=FASES[i];
  if(v.length>=8){
    if(v.length===10&&FASE_DEFAULTS[i]&&!v.includes(' '))document.getElementById('fd-'+i).value=v+' '+FASE_DEFAULTS[i];
    if(!c.checked){c.checked=true;unlockNext(i);refreshStepStyles();}
  } else {
    // only uncheck if date is required (goLive only)
    if(!f.dateOptional&&!f.checkOnly&&c.checked){c.checked=false;cascadeLock(i+1);refreshStepStyles();}
  }
}
function cascadeLock(from){
  for(let j=from;j<FASES.length;j++){
    const nc=document.getElementById('fc-'+j),nd=document.getElementById('fd-'+j);
    if(nc){nc.checked=false;nc.disabled=true;}
    if(nd){nd.value='';nd.disabled=true;}
    document.getElementById('fs-'+j).className='fstep locked';
  }
}
function unlockNext(i){
  if(i+1<FASES.length){
    const nc=document.getElementById('fc-'+(i+1)),nd=document.getElementById('fd-'+(i+1));
    if(nc)nc.disabled=false;if(nd)nd.disabled=false;
    document.getElementById('fs-'+(i+1)).className='fstep next';
  }
}
function refreshStepStyles(){
  for(let i=0;i<FASES.length;i++){
    const c=document.getElementById('fc-'+i),el=document.getElementById('fs-'+i);
    if(!el||!c)continue;
    el.className='fstep '+(c.checked?'done':c.disabled?'locked':'next');
  }
}

// log
function parseLogEntries(log){if(!log)return[];return log.split('\n').filter(Boolean).map(e=>{const m=e.match(/^\[(.+?)\] (.+)$/s);return m?{ts:m[1],text:m[2]}:{ts:'',text:e};});}
function entriesToLog(entries){return entries.map(e=>e.ts?`[${e.ts}] ${e.text}`:e.text).join('\n');}
function buildLogView(log){
  const entries=parseLogEntries(log);
  if(!entries.length)return '<div style="color:var(--text3);font-size:11px;font-style:italic;padding:8px 0">Nenhuma anotação ainda.</div>';
  return [...entries].reverse().map((e,ri)=>{
    const realIdx=entries.length-1-ri;
    return `<div class="log-entry" id="le-${realIdx}">${e.ts?`<div class="log-ts">${e.ts}</div>`:''}<div class="log-txt" id="lt-${realIdx}">${e.text}</div><div class="log-acts"><button class="lbtn" onclick="editEntry(${realIdx})">Editar</button><button class="lbtn del" onclick="deleteEntry(${realIdx})">Excluir</button></div></div>`;
  }).join('');
}

  sb.onclick=()=>{entries[idx].text=ta.value.trim()||e.text;lv.dataset.log=entriesToLog(entries);lv.innerHTML=buildLogView(lv.dataset.log);};

  document.getElementById('flow-steps').innerHTML=buildFlowSteps(l);

  const lv=document.getElementById('log-view');
  lv.dataset.log=l.log||'';lv.innerHTML=buildLogView(l.log||'');
  document.getElementById('f-note').value='';
  document.getElementById('f-btn-del').style.display=idx===-1?'none':'block';
  document.getElementById('ov-gl').classList.add('open');
  setModalReadonly('ov-gl');
}

function closeModal(){document.getElementById('ov-gl').classList.remove('open');}
function saveLoja(){
  if(!canEdit()){showToast("Somente leitura.",true);return;}
  if(!document.getElementById('f-loja').value.trim()){alert('Informe o nome da loja.');return;}
  const dates={};
  for(let i=0;i<FASES.length;i++){
    const f=FASES[i],c=document.getElementById('fc-'+i);
    if(f.checkOnly){dates[f.key]=c.checked?'1':'';}
    else if(f.dateOptional){
      const v=(document.getElementById('fd-'+i)||{value:''}).value.trim();
      dates[f.key]=c.checked?(v||'1'):'';
    }
    else{const v=(document.getElementById('fd-'+i)||{value:''}).value.trim();dates[f.key]=c.checked?v:'';}
  }
  const obj={loja:document.getElementById('f-loja').value.trim().toUpperCase(),num:document.getElementById('f-num').value.trim(),grupo:document.getElementById('f-grupo').value.trim(),responsavel:document.getElementById('f-resp').value,status:document.getElementById('f-status').value,log:document.getElementById('log-view').dataset.log||'',...dates};
  const idx=parseInt(document.getElementById('f-idx').value);
  if(idx===-1)lojas.push(obj);else lojas[idx]=obj;
  save();closeModal();renderGLContent();
}
function deleteLoja(){
  if(!canEdit()){showToast("Somente leitura.",true);return;}
  if(modalIdx<0)return;
  if(!confirm(`Excluir "${lojas[modalIdx].loja}"?`))return;
  lojas.splice(modalIdx,1);save();closeModal();renderGLContent();
}

document.getElementById('hdate').textContent='Hoje: '+TODAY.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
initApp();
