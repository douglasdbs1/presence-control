<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faturamento — Ideologica</title>
<link rel="canonical" href="https://douglasdbs1.github.io/gruporestaura/ideologica/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="logo-bar">
  <img src="../logo.png" alt="Grupo Restaura Franchising">
</div>

<div class="topbar">
  <span class="sys-title">Faturamento</span>
  <span class="sys-sub">Ideologica / Allegro.Net</span>
  <div class="spacer"></div>
  <!-- Comparativo escondido temporariamente (16/07/2026) a pedido do Douglas, antes de apresentar o sistema aos consultores -->
  <div class="app-switch">
    <a href="../presence/index.html" id="switch-presence">Presence</a>
    <span class="app-switch-div"></span>
    <span class="on">Ideológica</span>
  </div>
  <a class="topbar-link" href="#" onclick="hallLogout();location.href='../index.html';return false;" style="margin-left:10px;">Sair</a>
</div>

<div class="content">

  <div class="filters">
    <div class="fg">
      <label>Bandeira</label>
      <select id="f-bandeira">
        <option value="">Todas</option>
        <option value="rj">Restaura Jeans</option>
        <option value="ml">Minha Lavanderia</option>
        <option value="mega">Mega</option>
      </select>
    </div>
    <div class="fg">
      <label>Loja</label>
      <select id="f-loja"><option value="">Todas</option></select>
    </div>
    <div class="fg">
      <label>Consultor</label>
      <select id="f-consultor"><option value="">Todos</option></select>
    </div>
    <div class="fg">
      <label>Período</label>
      <div class="pill-toggle" id="f-mes-pills"></div>
    </div>
    <button class="btn-clear" id="btn-clear">Limpar filtros</button>
  </div>

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Faturamento total</div>
      <div class="kpi-value teal" id="kpi-faturamento">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total de tickets</div>
      <div class="kpi-value" id="kpi-tickets">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Ticket médio</div>
      <div class="kpi-value" id="kpi-ticket-medio">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Peças captadas p/ tingimento</div>
      <div class="kpi-value" id="kpi-tingimento">—</div>
    </div>
    <div class="kpi sm">
      <div class="kpi-label">Lojas reportadas</div>
      <div class="kpi-value" id="kpi-lojas">—</div>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <h3>Faturamento por Loja (top 10)</h3>
      <div id="rank-loja"></div>
    </div>
    <div class="panel">
      <h3>Faturamento por Consultor</h3>
      <div id="rank-consultor"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="loja">Loja</th>
          <th data-sort="consultor">Consultor</th>
          <th>Período</th>
          <th class="num" data-sort="total_faturado">Faturamento</th>
          <th class="num" data-sort="total_tickets">Tickets</th>
          <th class="num">Ticket médio</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="state-msg">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js?v=20260715"></script>
<script src="js/config.js?v=20260715"></script>
<script src="js/dashboard.js?v=20260720-localizacao"></script>
</body>
</html>
